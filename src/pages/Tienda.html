<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codexar - Tienda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/Home.css">
    <link rel="stylesheet" href="../assets/css/Tienda.css">
    <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body>

    <nav class="navbar">
        <div class="brand" onclick="window.location.href='Home.html'" style="cursor:pointer;">Codex<span>ar</span></div>
        <div class="user-pill-container">
            <div class="user-pill" id="userPill">
                <div class="avatar" id="navAvatar"></div>
                <div class="username-display" id="navUsername">Cargando...</div>
            </div>
            <div class="user-dropdown">
                <a href="Home.html" class="dropdown-item">Inicio</a>
                <a href="Profile.html" class="dropdown-item">Perfil</a>
                <a href="Logros.html" class="dropdown-item">Logros</a>
                <a href="Tienda.html" class="dropdown-item">Tienda</a>
                <a href="Friends.html" class="dropdown-item">Amigos</a>
                <a href="Leaderboard.html" class="dropdown-item">Clasificación</a>
                <a href="#" class="dropdown-item">Ayuda</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <main class="tienda-container">
        <div class="tienda-header">
            <div class="tienda-title-block">
                <h1 class="tienda-title">Tienda</h1>
                <p class="tienda-subtitle">Personaliza tu perfil con monedas ganadas en batalla</p>
            </div>
            <div class="coins-display" id="coinsDisplay">
                <span class="coins-icon">◈</span>
                <span class="coins-amount" id="coinsAmount">---</span>
                <span class="coins-label">monedas</span>
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="tienda-tabs">
            <button class="tab-btn active" data-tab="frame">Marcos</button>
            <button class="tab-btn" data-tab="background">Fondos</button>
            <button class="tab-btn" data-tab="upgrade">Mejoras</button>
        </div>

        <!-- Items Grid -->
        <div class="tienda-grid" id="tiendaGrid">
            <div class="tienda-loading">Cargando artículos...</div>
        </div>
    </main>

    <!-- Toast notification -->
    <div id="tiendaToast" class="tienda-toast"></div>

    <script src="../services/matchmakingGlobal.js"></script>
    <script src="../services/tienda.js"></script>
    <script src="../services/globalBg.js"></script>
</body>
</html>
