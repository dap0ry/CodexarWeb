<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/src/services/mobileRedirect.js"></script>
    <script src="/src/services/themeService.js"></script>
    <script src="/src/services/i18n.js"></script>
    <title>Codexar — Supervivencia</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/assets/css/Supervivencia.css">
    <link rel="stylesheet" href="/src/assets/css/global.css">
    <link rel="stylesheet" href="/src/assets/css/themes.css">
</head>
<body>

    <nav class="navbar">
        <div class="brand" onclick="window.location.href='/home'" style="cursor:pointer;">Codex<span>ar</span></div>
        <div class="user-pill-container">
            <div class="user-pill" id="userPill">
                <div class="avatar" id="navAvatar"></div>
                <div class="username-display" id="navUsername">Cargando...</div>
            </div>
            <div class="user-dropdown">
                <a href="/home"          class="dropdown-item" data-i18n="nav.home">Inicio</a>
                <a href="/configuracion" class="dropdown-item" data-i18n="nav.settings">Configuración</a>
                <a href="/precios"       class="dropdown-item" data-i18n="nav.plans">✦ Planes</a>
                <a href="/logros"        class="dropdown-item" data-i18n="nav.achievements">Logros</a>
                <a href="/amigos"        class="dropdown-item" data-i18n="nav.friends">Amigos</a>
                <a href="/clasificacion" class="dropdown-item" data-i18n="nav.leaderboard">Clasificación</a>
                <a href="#"              class="dropdown-item" data-i18n="nav.help">Ayuda</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn" data-i18n="nav.logout">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="surv-page">

        <button class="surv-back" onclick="window.location.href='/home'">← Volver</button>

        <div class="surv-card">

            <div class="surv-header">
                <div class="surv-eyebrow">
                    <span class="surv-dot"></span>
                    SUPERVIVENCIA
                </div>
                <div class="surv-subtitle">30 minutos para aguantar — cada ejercicio que resuelves suma 5 más</div>
            </div>

            <!-- 4 player slots -->
            <div class="surv-slots" id="survLobbySlots">
                <!-- Injected by JS -->
            </div>

            <!-- Personal record -->
            <div class="surv-record-bar">
                <div class="surv-record-title">MEJOR PARTIDA</div>
                <div class="surv-record-cols">
                    <div class="surv-record-col">
                        <span class="surv-record-col-label">MEJOR TIEMPO</span>
                        <span class="surv-record-col-val" id="survRecordTime">--:--</span>
                    </div>
                    <div class="surv-record-col-sep"></div>
                    <div class="surv-record-col">
                        <span class="surv-record-col-label">EJERCICIOS RESUELTOS</span>
                        <span class="surv-record-col-val" id="survRecordEx">0</span>
                    </div>
                </div>
            </div>

            <!-- Start button -->
            <button class="surv-btn-start" id="survStartBtn" onclick="startGame()">INICIAR PARTIDA →</button>

        </div>
    </div>

    <!-- Friend invite modal -->
    <div class="surv-modal-overlay hidden" id="survInviteModal">
        <div class="surv-modal">
            <div class="surv-modal-header">
                <span>Invitar Amigo</span>
                <button class="surv-modal-close" id="survCloseModal">✕</button>
            </div>
            <div class="surv-modal-body" id="survFriendList"></div>
        </div>
    </div>

    <script src="/src/services/matchmakingGlobal.js"></script>
    <script src="/src/services/supervivencia.js"></script>
    <script src="/src/services/friendlyNotifications.js"></script>
    <script src="/src/services/survivalNotifications.js"></script>
</body>
</html>
