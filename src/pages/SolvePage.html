<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/src/services/themeService.js"></script>
    <title>Codexar - Resolver Ejercicio</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/assets/css/Home.css">
    <link rel="stylesheet" href="/src/assets/css/SolvePage.css">
    <link rel="stylesheet" href="/src/assets/css/global.css">
    <link rel="stylesheet" href="/src/assets/css/themes.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand" onclick="window.location.href='/home'" style="cursor:pointer;">Codex<span>ar</span></div>
        <div class="user-pill-container">
            <div class="user-pill" id="userPill">
                <div class="avatar" id="navAvatar"></div>
                <div class="username-display" id="navUsername">Cargando...</div>
            </div>
            <div class="user-dropdown">
                <a href="/home" class="dropdown-item">Inicio</a>
                <a href="/configuracion" class="dropdown-item">Configuración</a>
                <a href="/logros" class="dropdown-item">Logros</a>
                <a href="/amigos" class="dropdown-item">Amigos</a>
                <a href="/clasificacion" class="dropdown-item">Clasificación</a>
                <a href="#" class="dropdown-item">Ayuda</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <!-- Back Button -->
    <div class="solve-breadcrumb">
        <button class="btn-back" onclick="window.location.href='/ejercicios'">
            <span>←</span> Volver a Ejercicios
        </button>
        <div class="breadcrumb-title" id="breadcrumbTitle">Cargando...</div>
    </div>

    <!-- Main Solve Layout -->
    <main class="solve-main">
        <!-- Left Panel: Statement + Test Cases -->
        <div class="solve-left">
            <!-- Exercise Statement -->
            <div class="solve-statement">
                <div class="statement-header">
                    <div class="statement-title" id="exTitle">Cargando ejercicio...</div>
                    <div class="statement-badges" id="exBadges"></div>
                </div>
                <div class="statement-body" id="exDescription">Cargando enunciado...</div>
            </div>

            <!-- Test Cases -->
            <div class="solve-testcases">
                <div class="testcases-label">Casos de Prueba</div>
                <div id="testCasesList" class="testcases-list">
                    <!-- injected by JS -->
                </div>
            </div>
        </div>

        <!-- Right Panel: Code Editor -->
        <div class="solve-right">
            <!-- Language Selector -->
            <div class="editor-toolbar">
                <div class="lang-pills" id="langPills">
                    <button class="lang-pill active" data-lang="Python">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" alt="Python">
                        Python
                    </button>
                    <button class="lang-pill" data-lang="C++">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg" alt="C++">
                        C++
                    </button>
                    <button class="lang-pill" data-lang="Java">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg" alt="Java">
                        Java
                    </button>
                    <button class="lang-pill" data-lang="Go">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/go/go-original.svg" alt="Go">
                        Go
                    </button>
                    <button class="lang-pill" data-lang="C#">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/csharp/csharp-original.svg" alt="C#">
                        C#
                    </button>
                </div>
                <div class="editor-status" id="editorStatus"></div>
            </div>

            <!-- Code Editor (Monaco) -->
            <div class="editor-wrapper">
                <div id="codeEditor"></div>
            </div>

            <!-- Output / Feedback Area -->
            <div class="editor-output" id="editorOutput" style="display:none;">
                <div id="outputContent"></div>
            </div>

            <!-- Action Buttons -->
            <div class="editor-actions">
                <button id="btnCheck" class="btn-check">
                    <span class="btn-icon">▶</span> Comprobar Código
                </button>
                <button id="btnSave" class="btn-save" style="display:none;">
                    <span class="btn-icon">✓</span> Guardar Solución
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
    <script src="/src/services/matchmakingGlobal.js"></script>
    <script src="/src/services/solveExercise.js"></script>
</body>
</html>
