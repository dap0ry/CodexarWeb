<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codexar - Modo Historia</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/Home.css">
    <link rel="stylesheet" href="../assets/css/StoryMode.css">
</head>
<body>
    
    <!-- Navbar -->
    <nav class="navbar" style="z-index: 100;">
        <div class="brand" onclick="window.location.href='Home.html'" style="cursor:pointer;">Codex<span>ar</span></div>
        <div class="user-pill-container">
            <div class="user-pill" id="userPill">
                <div class="avatar" id="navAvatar"></div>
                <div class="username-display" id="navUsername">Cargando...</div>
            </div>
            <div class="user-dropdown">
                <a href="Home.html" class="dropdown-item">Inicio</a>
                <a href="Profile.html" class="dropdown-item">Perfil</a>
                <a href="Friends.html" class="dropdown-item">Amigos</a>
                <a href="Leaderboard.html" class="dropdown-item">Clasificación</a>
                <a href="#" class="dropdown-item">Ayuda</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="story-container">
        
        <!-- Interactive 3D Rotation -->
        <div class="scene">
            <div class="carousel" id="carousel">
                <!-- Javascript maps 6 completely rendered cards here based on API -->
                <div style="text-align:center; padding-top:200px; color:#8b8b9a; width: 100%;">Contactando con Codexar Hub...</div>
            </div>
        </div>

        <!-- Carousel navigation -->
        <div class="carousel-controls" id="carouselControls" style="display:none;">
            <button class="btn-nav" id="btnPrev">←</button>
            <button class="btn-nav" id="btnNext">→</button>
        </div>
        
    </div>

    <!-- Toast for locked interaction -->
    <div id="toast" style="position:fixed; bottom:20px; right:20px; background:var(--glow-locked); padding:12px 20px; border-radius:8px; border:1px solid #ff4444; color:#fff; display:none; z-index:999;"></div>

    <script src="../services/storyMode.js"></script>
</body>
</html>
