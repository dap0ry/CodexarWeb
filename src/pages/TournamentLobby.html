<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/src/services/themeService.js"></script>
    <title>Codexar — Sala de Torneo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/assets/css/global.css">
    <link rel="stylesheet" href="/src/assets/css/themes.css">
    <link rel="stylesheet" href="/src/assets/css/TournamentLobby.css">
</head>
<body>

<nav class="navbar">
    <div class="brand" onclick="window.location.href='/torneos'" style="cursor:pointer;">Codex<span>ar</span></div>
    <div class="user-pill-container">
        <div class="user-pill" id="userPill">
            <div class="avatar" id="navAvatar"></div>
            <div class="username-display" id="navUsername">Cargando...</div>
        </div>
        <div class="user-dropdown">
            <a href="/home"          class="dropdown-item">Inicio</a>
            <a href="/configuracion" class="dropdown-item">Configuración</a>
            <a href="/torneos"       class="dropdown-item">Torneos</a>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="tl-page">
    <div class="tl-box" id="lobbyBox">

        <!-- Tournament header -->
        <div class="tl-tourn-header">
            <div class="tl-tourn-tag" id="tournTag">⚔ TORNEO</div>
            <div class="tl-tourn-name" id="tournName">Cargando...</div>
            <div class="tl-tourn-desc" id="tournDesc"></div>
        </div>

        <!-- VS area -->
        <div class="tl-vs-area">

            <div class="tl-player" id="meSlot">
                <div class="tl-avatar" id="meAvatar"></div>
                <div class="tl-player-name" id="meName">—</div>
                <div class="tl-player-badge tl-badge--ready">✓ En sala</div>
            </div>

            <div class="tl-vs-mid">
                <div class="tl-vs-label">VS</div>
                <div class="tl-timer" id="lobbyTimer"></div>
            </div>

            <div class="tl-player" id="opponentSlot">
                <div class="tl-avatar tl-avatar--ghost" id="opponentAvatar">?</div>
                <div class="tl-player-name" id="opponentName">—</div>
                <div class="tl-player-badge tl-badge--waiting" id="opponentBadge">Esperando...</div>
            </div>

        </div>

        <!-- Status -->
        <div class="tl-status" id="statusMsg">Conectando...</div>

        <!-- Back -->
        <button class="tl-back" id="backBtn">← Volver al bracket</button>

    </div>
</div>

<script src="/src/services/globalBg.js"></script>
<script src="/src/services/tournamentLobby.js"></script>
</body>
</html>
