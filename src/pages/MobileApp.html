<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codexar</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cyan:    #00ffcc;
            --green:   #22c55e;
            --red:     #f87171;
            --bg:      #080810;
            --card:    #12121d;
            --border:  rgba(255,255,255,0.06);
            --text:    #e4e4f0;
            --muted:   rgba(255,255,255,0.38);
            --mono:    'JetBrains Mono', monospace;
            --sans:    'Inter', sans-serif;
        }

        html, body {
            height: 100%; height: 100dvh;
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── LAYOUT ── */
        .app { height: 100dvh; display: flex; flex-direction: column; }

        /* ── HEADER ── */
        .app-header {
            flex-shrink: 0;
            height: calc(52px + env(safe-area-inset-top));
            padding-top: env(safe-area-inset-top);
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 20px; padding-right: 16px;
            background: rgba(8,8,16,0.96);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            position: relative; z-index: 10;
        }
        .header-title {
            font-family: var(--mono);
            font-size: 0.9rem; font-weight: 700; letter-spacing: -0.3px;
        }
        .header-av {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(0,255,204,0.08);
            border: 1px solid rgba(0,255,204,0.2);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 0.78rem; font-weight: 700;
            color: var(--cyan); overflow: hidden; cursor: pointer; flex-shrink: 0;
            position: relative;
        }
        .header-av img { position:absolute;inset:0;width:100%;height:100%;object-fit:cover; }

        /* ── MAIN ── */
        .app-main {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .screen { display: none; }
        .screen.active { display: block; }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            flex-shrink: 0; display: flex;
            background: rgba(8,8,16,0.97);
            border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 4px;
            padding: 10px 4px 8px; border: none; background: transparent;
            color: var(--muted); cursor: pointer; transition: color 0.15s;
            font-family: var(--sans); -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .nav-btn.active { color: var(--cyan); }
        .nav-btn.active svg { transform: translateY(-1px); }
        .nav-label { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.3px; }
        .nav-badge {
            position: absolute; top: 7px; right: calc(50% - 14px);
            min-width: 16px; height: 16px; border-radius: 8px;
            background: var(--red); color: #fff;
            font-size: 0.55rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            padding: 0 4px;
            display: none;
        }
        .nav-badge.show { display: flex; }

        /* ── SHARED ── */
        .feed { padding: 12px 16px 24px; display: flex; flex-direction: column; gap: 10px; }
        .section-eyebrow {
            font-family: var(--mono); font-size: 0.55rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            color: rgba(0,255,204,0.4); padding: 20px 20px 4px;
        }
        .skel {
            background: linear-gradient(90deg, var(--card) 25%, rgba(255,255,255,0.04) 50%, var(--card) 75%);
            background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
        .skel-block { height: 72px; border-radius: 12px; }
        .empty-state {
            text-align: center; padding: 48px 24px; color: var(--muted);
            font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.5px; line-height: 1.7;
        }

        /* ── NEWS ── */
        .news-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px;
        }
        .news-card-meta {
            font-family: var(--mono); font-size: 0.58rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: rgba(0,255,204,0.4); margin-bottom: 8px;
        }
        .news-card-title { font-size: 0.96rem; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
        .news-card-sub {
            font-size: 0.82rem; color: var(--muted); line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* ── FRIENDS — Add bar ── */
        .add-friend-bar {
            display: flex; gap: 8px;
            padding: 16px 16px 0;
        }
        .add-friend-input {
            flex: 1; font-family: var(--mono); font-size: 0.82rem;
            padding: 11px 14px; background: var(--card);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); outline: none;
            transition: border-color 0.15s; -webkit-appearance: none;
        }
        .add-friend-input::placeholder { color: var(--muted); }
        .add-friend-input:focus { border-color: rgba(0,255,204,0.3); }
        .add-friend-btn {
            font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
            padding: 11px 16px; border-radius: 10px; border: 1px solid rgba(0,255,204,0.25);
            background: rgba(0,255,204,0.07); color: var(--cyan);
            cursor: pointer; white-space: nowrap; flex-shrink: 0;
            -webkit-tap-highlight-color: transparent; transition: background 0.15s;
        }
        .add-friend-btn:active { background: rgba(0,255,204,0.14); }
        .add-friend-btn:disabled { opacity: 0.45; }
        .add-feedback {
            margin: 6px 16px 0;
            font-family: var(--mono); font-size: 0.7rem; padding: 8px 12px;
            border-radius: 8px; display: none;
        }
        .add-feedback.ok  { color: var(--cyan); background: rgba(0,255,204,0.06); border: 1px solid rgba(0,255,204,0.15); display: block; }
        .add-feedback.err { color: var(--red);  background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.15); display: block; }

        /* ── FRIENDS — section labels ── */
        .friends-section {
            padding: 16px 16px 0;
        }
        .friends-section-label {
            font-family: var(--mono); font-size: 0.55rem; font-weight: 700;
            letter-spacing: 2.5px; text-transform: uppercase;
            color: rgba(255,255,255,0.2); margin-bottom: 8px;
        }
        .friends-count {
            font-family: var(--mono); font-size: 0.55rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            color: rgba(0,255,204,0.4); padding: 16px 16px 4px;
        }

        /* ── FRIENDS — avatar (shared by friends + requests) ── */
        .av {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 0.85rem; font-weight: 700;
            color: var(--muted); overflow: hidden; flex-shrink: 0; position: relative;
        }
        .av img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
        .av-wrap { position: relative; flex-shrink: 0; }
        .av-dot {
            position: absolute; bottom: 1px; right: 1px;
            width: 10px; height: 10px; border-radius: 50%;
            border: 2px solid var(--bg); background: rgba(255,255,255,0.15);
        }
        .av-dot.online { background: var(--green); }

        /* ── FRIENDS — friend row ── */
        .friend-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px; background: var(--card);
            border: 1px solid var(--border); border-radius: 12px;
        }
        .friend-info { flex: 1; min-width: 0; }
        .friend-name {
            font-family: var(--mono); font-size: 0.82rem; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .friend-sub {
            font-size: 0.72rem; color: var(--muted); margin-top: 2px;
        }
        .friend-sub.online { color: var(--green); }
        .friend-elo {
            font-family: var(--mono); font-size: 0.68rem; font-weight: 700;
            color: rgba(0,255,204,0.45); white-space: nowrap;
        }
        .friend-row { cursor: pointer; }
        .friend-row:active { opacity: 0.75; }

        /* ── FRIEND CARD MODAL ── */
        .fcard-backdrop {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.65);
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.22s ease;
        }
        .fcard-backdrop.open { opacity: 1; pointer-events: auto; }
        .fcard {
            width: 100%; max-width: 480px;
            background: var(--card);
            border-radius: 20px 20px 0 0;
            border: 1px solid var(--border); border-bottom: none;
            overflow: hidden;
            transform: translateY(100%);
            transition: transform 0.28s cubic-bezier(.32,1.1,.42,.98);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .fcard-backdrop.open .fcard { transform: translateY(0); }
        .fcard-banner {
            height: 110px; position: relative;
            background: #111;
            background-size: cover; background-position: center;
        }
        .fcard-banner::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(7,7,15,0.85));
        }
        .fcard-close {
            position: absolute; top: 10px; right: 12px; z-index: 1;
            background: rgba(0,0,0,0.45); border: none;
            color: #fff; border-radius: 50%; width: 28px; height: 28px;
            font-size: 1rem; cursor: pointer; line-height: 28px; text-align: center;
        }
        .fcard-body {
            padding: 0 20px 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .fcard-av-wrap { margin-top: -36px; position: relative; }
        .fcard-av {
            width: 72px; height: 72px; border-radius: 50%;
            border: 3px solid var(--bg);
            background: var(--border);
            font-family: var(--mono); font-size: 1.5rem; font-weight: 800;
            color: rgba(255,255,255,0.6);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .fcard-av img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .fcard-av-dot {
            position: absolute; bottom: 3px; right: 3px;
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid var(--bg); background: rgba(255,255,255,0.15);
        }
        .fcard-av-dot.online { background: var(--green); }
        .fcard-name {
            font-family: var(--mono); font-size: 1rem; font-weight: 800;
            margin-top: 10px; text-align: center;
        }
        .fcard-stats {
            display: flex; gap: 28px; margin-top: 14px;
        }
        .fcard-stat { text-align: center; }
        .fcard-stat-val {
            font-family: var(--mono); font-size: 1rem; font-weight: 700;
            color: var(--cyan);
        }
        .fcard-stat-key {
            font-size: 0.65rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .fcard-rank {
            font-size: 0.7rem; color: var(--muted); margin-top: 4px;
        }
        .fcard-actions {
            display: flex; gap: 10px; margin-top: 18px; width: 100%;
        }
        .fcard-btn {
            flex: 1; padding: 10px 0;
            border: 1px solid var(--border); background: transparent;
            color: var(--text); font-family: var(--mono); font-size: 0.75rem; font-weight: 700;
            border-radius: 10px; cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .fcard-btn.primary { background: var(--cyan); color: #07070f; border-color: var(--cyan); }
        .fcard-btn:active { opacity: 0.75; }

        /* ── FRIENDS — request row ── */
        .req-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px; background: var(--card);
            border: 1px solid rgba(0,255,204,0.08); border-radius: 12px;
        }
        .req-info { flex: 1; min-width: 0; }
        .req-name {
            font-family: var(--mono); font-size: 0.82rem; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .req-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .req-btn {
            font-family: var(--mono); font-size: 0.65rem; font-weight: 700;
            padding: 7px 12px; border-radius: 7px; cursor: pointer;
            border: 1px solid; transition: opacity 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .req-btn:disabled { opacity: 0.4; }
        .req-btn.accept { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.25); color: var(--green); }
        .req-btn.reject { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.2); color: var(--red); }
        .req-btn.cancel { background: rgba(255,255,255,0.04); border-color: var(--border); color: var(--muted); }

        /* ── TOURNAMENTS ── */
        .tourn-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden; cursor: pointer;
            transition: border-color 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .tourn-card.open { border-color: rgba(0,255,204,0.22); }

        /* banner */
        .tourn-banner {
            position: relative; height: 130px; overflow: hidden;
            background: linear-gradient(135deg, #0c0c1e 0%, #131328 100%);
        }
        .tourn-banner::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .tourn-banner img {
            position: absolute; inset: 0;
            width: 100%; height: 100%; object-fit: cover;
            transition: opacity 0.3s;
        }
        .tourn-banner-letter {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 3.5rem; font-weight: 800;
            color: rgba(0,255,204,0.07); user-select: none;
            z-index: 0;
        }
        .tourn-banner-fade {
            position: absolute; bottom: 0; left: 0; right: 0; height: 56px;
            background: linear-gradient(transparent, var(--card));
            z-index: 1;
        }
        .tourn-status-badge {
            position: absolute; top: 10px; right: 10px; z-index: 2;
            font-family: var(--mono); font-size: 0.5rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 4px 9px; border-radius: 4px;
        }
        .tourn-status-badge.upcoming  { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
        .tourn-status-badge.active    { background: rgba(34,197,94,0.12);  color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
        .tourn-status-badge.finished  { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

        /* card body */
        .tourn-body { padding: 12px 14px 10px; }
        .tourn-name {
            font-family: var(--mono); font-size: 0.9rem; font-weight: 700;
            line-height: 1.25; margin-bottom: 6px;
        }
        .tourn-meta {
            display: flex; align-items: center; gap: 12px;
            font-size: 0.74rem; color: var(--muted);
        }
        .tourn-meta-sep { color: rgba(255,255,255,0.12); }
        .tourn-desc {
            font-size: 0.78rem; color: var(--muted); line-height: 1.5;
            margin-top: 6px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* joined indicator */
        .tourn-joined-pill {
            display: inline-flex; align-items: center; gap: 5px;
            font-family: var(--mono); font-size: 0.58rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            color: var(--cyan); margin-top: 8px;
        }
        .tourn-joined-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--cyan);
        }

        /* action bar — slides in on tap */
        .tourn-action {
            max-height: 0; overflow: hidden;
            transition: max-height 0.25s cubic-bezier(0.4,0,0.2,1),
                        padding 0.25s;
            border-top: 1px solid transparent;
            padding: 0 14px;
        }
        .tourn-card.open .tourn-action {
            max-height: 72px;
            border-top-color: var(--border);
            padding: 12px 14px;
        }
        .tourn-action-inner { display: flex; gap: 8px; }
        .tourn-action-btn {
            font-family: var(--mono); font-size: 0.74rem; font-weight: 700;
            padding: 10px 18px; border-radius: 8px; cursor: pointer;
            border: 1px solid; transition: opacity 0.15s, background 0.15s;
            -webkit-tap-highlight-color: transparent; flex: 1; text-align: center;
        }
        .tourn-action-btn:disabled { opacity: 0.4; cursor: default; }
        .tourn-action-btn.join  { background: rgba(0,255,204,0.08); border-color: rgba(0,255,204,0.3); color: var(--cyan); }
        .tourn-action-btn.leave { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.2); color: var(--red); }
        .tourn-action-btn.join:active  { background: rgba(0,255,204,0.16); }
        .tourn-action-btn.leave:active { background: rgba(248,113,113,0.12); }

        /* ── PROFILE ── */
        /* Banner strip */
        .pf-banner {
            height: 168px; position: relative; overflow: hidden;
            background: linear-gradient(135deg, #0a0a1c 0%, #10102a 100%);
        }
        .pf-banner::before {
            content: ''; position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .pf-banner-img {
            position: absolute; inset: 0;
            width: 100%; height: 100%; object-fit: cover; z-index: 1;
        }
        .pf-banner-fade {
            position: absolute; bottom: 0; left: 0; right: 0; height: 90px;
            background: linear-gradient(transparent, var(--bg)); z-index: 2;
        }
        /* Identity block overlapping banner */
        .pf-identity {
            position: relative; z-index: 3;
            margin-top: -44px;
            display: flex; flex-direction: column; align-items: center; gap: 7px;
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .pf-av {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid var(--bg);
            background: rgba(0,255,204,0.08);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 2rem; font-weight: 800; color: var(--cyan);
            overflow: hidden; position: relative; flex-shrink: 0;
        }
        .pf-av img { position:absolute;inset:0;width:100%;height:100%;object-fit:cover; }
        .pf-badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .pf-role-badge {
            font-family: var(--mono); font-size: 0.5rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 3px 8px; border-radius: 4px;
        }
        .pf-role-mod  { background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }
        .pf-role-admin{ background: rgba(251,191,36,0.1);   color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
        .pf-sub-plus  { background: rgba(96,165,250,0.1);   color: #60a5fa; border: 1px solid rgba(96,165,250,0.2); }
        .pf-sub-max   { background: rgba(0,255,204,0.1);    color: var(--cyan); border: 1px solid rgba(0,255,204,0.2); }
        .pf-name { font-family: var(--mono); font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }
        .pf-email { font-size: 0.74rem; color: var(--muted); }
        .pf-elo-row { display: flex; align-items: center; gap: 8px; }
        .pf-elo {
            font-family: var(--mono); font-size: 0.65rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 20px;
            background: rgba(0,255,204,0.06); border: 1px solid rgba(0,255,204,0.18); color: var(--cyan);
        }
        .pf-rank {
            font-family: var(--mono); font-size: 0.62rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.4);
        }
        .pf-desc { font-size: 0.8rem; color: var(--muted); text-align: center; line-height: 1.6; max-width: 280px; }
        .pf-global-rank { font-family: var(--mono); font-size: 0.62rem; color: rgba(255,255,255,0.25); letter-spacing: 1px; }

        /* Sections */
        .pf-section { padding: 20px 16px 0; }
        .pf-section-label {
            font-family: var(--mono); font-size: 0.55rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            color: rgba(0,255,204,0.4); margin-bottom: 10px;
        }
        /* stat grid */
        .pf-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
        .pf-grid-2 { grid-template-columns: repeat(2,1fr); }
        .pf-stat {
            background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 8px; text-align: center;
        }
        .pf-stat-val {
            font-family: var(--mono); font-size: 1.15rem; font-weight: 800; letter-spacing: -0.5px;
            line-height: 1.1; margin-bottom: 4px;
        }
        .pf-stat-key { font-size: 0.6rem; color: var(--muted); }
        .cyan  { color: var(--cyan); }
        .green { color: var(--green); }
        .blue  { color: #60a5fa; }
        .muted { color: var(--muted); }
        /* diff bars */
        .diff-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px;
        }
        .diff-row:last-child { margin-bottom: 0; }
        .diff-label { font-size: 0.68rem; color: var(--muted); width: 80px; flex-shrink: 0; }
        .diff-track {
            flex: 1; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 3px; overflow: hidden;
        }
        .diff-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
        .d-facil  { background: #4ade80; }
        .d-normal { background: #60a5fa; }
        .d-dif    { background: #fbbf24; }
        .d-muydif { background: #f97316; }
        .d-insane { background: #f87171; }
        .d-abyss  { background: #c084fc; }
        .diff-count { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; }
        /* lang bar */
        .lang-bar { height: 8px; border-radius: 4px; overflow: hidden; display: flex; margin-bottom: 10px; }
        .lang-segment { height: 100%; }
        .lang-legend { display: flex; flex-wrap: wrap; gap: 8px 14px; }
        .lang-legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; color: var(--muted); }
        .lang-legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
        /* lang icons */
        .pf-lang-icons { display: flex; gap: 10px; flex-wrap: wrap; }
        .pf-lang-icon { width: 30px; height: 30px; object-fit: contain; filter: grayscale(0.2); }
        /* team */
        .pf-team {
            display: flex; align-items: center; gap: 12px;
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 13px 14px; text-decoration: none; color: var(--text);
        }
        .pf-team-av {
            width: 36px; height: 36px; border-radius: 8px;
            background: rgba(255,255,255,0.07); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 0.85rem; font-weight: 700;
            overflow: hidden; flex-shrink: 0; background-size: cover; background-position: center;
        }
        .pf-team-name { font-family: var(--mono); font-size: 0.82rem; font-weight: 700; }
        .pf-team-label { font-size: 0.7rem; color: var(--muted); }
        /* socials */
        .pf-socials { display: flex; flex-wrap: wrap; gap: 8px; }
        .pf-social {
            display: flex; align-items: center; gap: 7px;
            background: var(--card); border: 1px solid var(--border); border-radius: 8px;
            padding: 8px 12px; text-decoration: none; color: var(--text);
            font-size: 0.75rem;
        }
        .pf-social img { width: 14px; height: 14px; }
        /* achievements */
        .pf-ach-list { display: flex; flex-direction: column; gap: 8px; }
        .pf-ach {
            display: flex; align-items: center; gap: 12px;
            background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 14px;
        }
        .pf-ach-icon { font-size: 1.4rem; flex-shrink: 0; }
        .pf-ach-title { font-family: var(--mono); font-size: 0.8rem; font-weight: 700; }
        .pf-ach-rarity {
            font-family: var(--mono); font-size: 0.52rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        .rarity-legendary { color: #fbbf24; }
        .rarity-epic      { color: #a78bfa; }
        .rarity-rare      { color: #60a5fa; }
        .rarity-common    { color: var(--muted); }
        /* survival sub-section */
        .pf-subsec-label {
            font-family: var(--mono); font-size: 0.52rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: rgba(255,255,255,0.2); margin-bottom: 6px; margin-top: 10px;
        }
        .pf-subsec-label:first-child { margin-top: 0; }
        /* actions */
        .pf-actions { padding: 20px 16px 52px; display: flex; flex-direction: column; gap: 8px; }
        .pf-action-btn {
            font-family: var(--mono); font-size: 0.78rem; font-weight: 700;
            padding: 14px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--card); color: var(--text);
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; -webkit-tap-highlight-color: transparent; text-decoration: none;
        }
        .pf-action-btn svg { color: var(--muted); flex-shrink: 0; }
        .pf-action-btn.danger { color: var(--red); border-color: rgba(248,113,113,0.15); }
        .pf-action-btn.danger svg { color: rgba(248,113,113,0.5); }
    </style>
</head>
<body>
<div class="app">

    <header class="app-header">
        <div class="header-title" id="headerTitle">Noticias</div>
        <div class="header-av" id="headerAv" onclick="switchTab('Perfil')"></div>
    </header>

    <main class="app-main">

        <!-- NOTICIAS -->
        <div class="screen active" id="screenNoticias">
            <div class="section-eyebrow">// Novedades</div>
            <div class="feed" id="feedNoticias">
                <div class="skel skel-block"></div>
                <div class="skel skel-block"></div>
                <div class="skel skel-block"></div>
            </div>
        </div>

        <!-- AMIGOS -->
        <div class="screen" id="screenAmigos">
            <!-- Add friend -->
            <div class="add-friend-bar">
                <input class="add-friend-input" id="addInput" type="text"
                       placeholder="Buscar por nombre de usuario..."
                       autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
                <button class="add-friend-btn" id="addBtn" onclick="sendRequest()">Añadir</button>
            </div>
            <div class="add-feedback" id="addFeedback"></div>

            <!-- Received requests -->
            <div id="secReceived" style="display:none">
                <div class="friends-count" id="lblReceived"></div>
                <div class="feed" style="padding-top:4px" id="feedReceived"></div>
            </div>

            <!-- Sent requests -->
            <div id="secSent" style="display:none">
                <div class="friends-count" id="lblSent"></div>
                <div class="feed" style="padding-top:4px" id="feedSent"></div>
            </div>

            <!-- Friends list -->
            <div class="friends-count" id="lblFriends">Amigos</div>
            <div class="feed" style="padding-top:4px" id="feedFriends">
                <div class="skel skel-block"></div>
                <div class="skel skel-block"></div>
                <div class="skel skel-block"></div>
            </div>
        </div>

        <!-- TORNEOS -->
        <div class="screen" id="screenTorneos">
            <div class="section-eyebrow">// Toca una card para inscribirte</div>
            <div class="feed" id="feedTorneos">
                <div class="skel" style="height:200px;border-radius:16px;"></div>
                <div class="skel" style="height:200px;border-radius:16px;"></div>
            </div>
        </div>

        <!-- PERFIL -->
        <div class="screen" id="screenPerfil">
            <div id="feedPerfil">
                <div class="pf-banner" style="height:168px;">
                    <div class="pf-banner-fade"></div>
                </div>
                <div class="pf-identity">
                    <div class="pf-av skel" style="border:none;"></div>
                    <div class="skel" style="width:120px;height:18px;border-radius:6px;margin-top:12px;"></div>
                    <div class="skel" style="width:160px;height:12px;border-radius:4px;margin-top:6px;"></div>
                </div>
            </div>
        </div>

    </main>

    <!-- FRIEND CARD MODAL -->
    <div class="fcard-backdrop" id="fcardBackdrop" onclick="closeFriendCard(event)">
        <div class="fcard" id="fcardSheet">
            <div class="fcard-banner" id="fcardBanner">
                <button class="fcard-close" onclick="closeFriendCard()">&#x2715;</button>
            </div>
            <div class="fcard-body">
                <div class="fcard-av-wrap">
                    <div class="fcard-av" id="fcardAv"></div>
                    <div class="fcard-av-dot" id="fcardDot"></div>
                </div>
                <div class="fcard-name" id="fcardName"></div>
                <div class="fcard-rank" id="fcardRank"></div>
                <div class="fcard-stats" id="fcardStats"></div>
                <div class="fcard-actions" id="fcardActions"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" id="nb-Noticias" onclick="switchTab('Noticias')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>
                <path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/>
            </svg>
            <span class="nav-label">Noticias</span>
        </button>
        <button class="nav-btn" id="nb-Amigos" onclick="switchTab('Amigos')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <div class="nav-badge" id="badgeAmigos"></div>
            <span class="nav-label">Amigos</span>
        </button>
        <button class="nav-btn" id="nb-Torneos" onclick="switchTab('Torneos')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                <path d="M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
            </svg>
            <span class="nav-label">Torneos</span>
        </button>
        <button class="nav-btn" id="nb-Perfil" onclick="switchTab('Perfil')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="nav-label">Perfil</span>
        </button>
    </nav>

</div>
<script>
(function () {
    const API  = 'https://api.codexar.es/api';
    const tok  = () => localStorage.getItem('access_token');
    const auth = () => ({ 'Authorization': 'Bearer ' + tok() });

    function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmtDate(iso) {
        if (!iso) return '';
        return new Date(iso).toLocaleDateString('es-ES', { day:'2-digit', month:'short' });
    }
    function fmtDateTime(iso) {
        if (!iso) return '';
        return new Date(iso).toLocaleDateString('es-ES', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    }

    // Avatar helper — uses <img> with onerror so photos always show or gracefully fall back
    function avHTML(username, avatar, size) {
        const s = size || 40;
        const init = esc((username || '?').charAt(0).toUpperCase());
        const imgTag = avatar
            ? `<img src="${esc(avatar)}" alt="" onerror="this.remove()">`
            : '';
        return `<div class="av" style="width:${s}px;height:${s}px">${imgTag}${init}</div>`;
    }

    let user      = null;
    let cache     = {};
    let activeTab = 'Noticias';

    // ── Init ──────────────────────────────────────────────────
    async function init() {
        if (!tok()) { window.location.replace('/mobile/auth'); return; }
        try {
            const res = await fetch(API + '/user/me', { headers: auth() });
            if (!res.ok) { localStorage.removeItem('access_token'); window.location.replace('/mobile/auth'); return; }
            user = await res.json();
        } catch (_) { window.location.replace('/mobile/auth'); return; }

        const av = document.getElementById('headerAv');
        if (user.avatar) {
            av.innerHTML = `<img src="${esc(user.avatar)}" alt="" onerror="this.remove()">` +
                           esc((user.username||'?').charAt(0).toUpperCase());
        } else {
            av.textContent = (user.username || '?').charAt(0).toUpperCase();
        }

        // Preload friend request badge without full render
        fetchFriendsBadge();
        loadTab('Noticias');
    }

    async function fetchFriendsBadge() {
        try {
            const res  = await fetch(API + '/friends', { headers: auth() });
            const data = await res.json();
            const n = (data.received || []).length;
            const badge = document.getElementById('badgeAmigos');
            if (n > 0) { badge.textContent = n; badge.classList.add('show'); }
        } catch (_) {}
    }

    // ── Tab switching ─────────────────────────────────────────
    window.switchTab = function (tab) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + tab).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('nb-' + tab).classList.add('active');
        document.getElementById('headerTitle').textContent = tab;
        activeTab = tab;
        if (!cache[tab]) loadTab(tab);
    };

    function loadTab(tab) {
        switch (tab) {
            case 'Noticias': loadNoticias(); break;
            case 'Amigos':   loadAmigos();   break;
            case 'Torneos':  loadTorneos();  break;
            case 'Perfil':   loadPerfil();   break;
        }
    }

    // ── NOTICIAS ──────────────────────────────────────────────
    async function loadNoticias() {
        const feed = document.getElementById('feedNoticias');
        try {
            const res   = await fetch(API + '/news/', { headers: auth() });
            const items = await res.json();
            const lang  = localStorage.getItem('codexar_lang') || 'es';
            if (!Array.isArray(items) || !items.length) {
                feed.innerHTML = '<div class="empty-state">Sin noticias</div>';
            } else {
                feed.innerHTML = items.map(n => {
                    const title    = (n.title_i18n && n.title_i18n[lang]) || n.title || '';
                    const subtitle = (n.subtitle_i18n && n.subtitle_i18n[lang]) || n.subtitle || '';
                    return `<div class="news-card">
                        <div class="news-card-meta">${esc(n.author_username || 'Codexar')} &middot; ${fmtDate(n.created_at)}</div>
                        <div class="news-card-title">${esc(title)}</div>
                        ${subtitle ? `<div class="news-card-sub">${esc(subtitle)}</div>` : ''}
                    </div>`;
                }).join('');
            }
        } catch (_) { feed.innerHTML = '<div class="empty-state">Error cargando noticias</div>'; }
        cache['Noticias'] = true;
    }

    // ── AMIGOS ────────────────────────────────────────────────
    async function loadAmigos() {
        const feedF = document.getElementById('feedFriends');
        try {
            const res  = await fetch(API + '/friends', { headers: auth() });
            const data = await res.json();

            const friends  = data.friends  || [];
            const received = data.received || [];
            const sent     = data.sent     || [];

            // Badge
            const badge = document.getElementById('badgeAmigos');
            if (received.length > 0) { badge.textContent = received.length; badge.classList.add('show'); }
            else { badge.classList.remove('show'); }

            // Received requests
            const secRec = document.getElementById('secReceived');
            if (received.length) {
                document.getElementById('lblReceived').textContent = 'Solicitudes recibidas — ' + received.length;
                document.getElementById('feedReceived').innerHTML = received.map(u => `
                    <div class="req-row" id="rec-${esc(u.username)}">
                        ${avHTML(u.username, u.avatar)}
                        <div class="req-info"><div class="req-name">${esc(u.username)}</div></div>
                        <div class="req-actions">
                            <button class="req-btn accept" onclick="friendAction('accept','${esc(u.username)}',this)">Aceptar</button>
                            <button class="req-btn reject" onclick="friendAction('reject','${esc(u.username)}',this)">Rechazar</button>
                        </div>
                    </div>`).join('');
                secRec.style.display = '';
            } else {
                secRec.style.display = 'none';
            }

            // Sent requests
            const secSent = document.getElementById('secSent');
            if (sent.length) {
                document.getElementById('lblSent').textContent = 'Solicitudes enviadas — ' + sent.length;
                document.getElementById('feedSent').innerHTML = sent.map(u => `
                    <div class="req-row" id="sent-${esc(u.username)}">
                        ${avHTML(u.username, u.avatar)}
                        <div class="req-info"><div class="req-name">${esc(u.username)}</div></div>
                        <div class="req-actions">
                            <button class="req-btn cancel" onclick="friendAction('cancel','${esc(u.username)}',this)">Cancelar</button>
                        </div>
                    </div>`).join('');
                secSent.style.display = '';
            } else {
                secSent.style.display = 'none';
            }

            // Friends list
            if (!friends.length) {
                document.getElementById('lblFriends').textContent = 'Amigos';
                feedF.innerHTML = '<div class="empty-state">Todavia no tienes amigos.<br>Busca a alguien por su nombre de usuario.</div>';
            } else {
                const online  = friends.filter(f => f.is_online);
                const offline = friends.filter(f => !f.is_online);
                document.getElementById('lblFriends').textContent =
                    'Amigos — ' + friends.length + (online.length ? ' · ' + online.length + ' online' : '');

                let html = '';
                if (online.length) {
                    html += '<div class="friends-section-label">Conectados</div>';
                    html += online.map(friendRow).join('');
                }
                if (offline.length) {
                    if (online.length) html += '<div class="friends-section-label" style="margin-top:4px">Desconectados</div>';
                    html += offline.map(friendRow).join('');
                }
                feedF.innerHTML = html;
            }
        } catch (e) {
            feedF.innerHTML = '<div class="empty-state">Error cargando amigos</div>';
        }
        cache['Amigos'] = true;
    }

    function friendRow(f) {
        const online = !!f.is_online;
        return `<div class="friend-row" onclick="openFriendCard('${esc(f.username)}',${online})">
            <div class="av-wrap">
                ${avHTML(f.username, f.avatar)}
                <div class="av-dot ${online ? 'online' : ''}"></div>
            </div>
            <div class="friend-info">
                <div class="friend-name">${esc(f.username)}</div>
                <div class="friend-sub ${online ? 'online' : ''}">${online ? 'En linea' : esc(f.last_seen_text || 'Desconectado')}</div>
            </div>
            ${f.elo != null ? `<div class="friend-elo">ELO ${f.elo}</div>` : ''}
        </div>`;
    }

    // ── FRIEND CARD MODAL ────────────────────────────────────
    window.openFriendCard = async function (username, isOnline) {
        const backdrop = document.getElementById('fcardBackdrop');
        const banner   = document.getElementById('fcardBanner');
        const avEl     = document.getElementById('fcardAv');
        const dotEl    = document.getElementById('fcardDot');
        const nameEl   = document.getElementById('fcardName');
        const rankEl   = document.getElementById('fcardRank');
        const statsEl  = document.getElementById('fcardStats');
        const actEl    = document.getElementById('fcardActions');

        // Reset to loading state
        banner.style.backgroundImage = '';
        avEl.innerHTML = `<span>${esc(username.charAt(0).toUpperCase())}</span>`;
        nameEl.textContent = username;
        rankEl.textContent = '';
        statsEl.innerHTML  = `<div style="color:var(--muted);font-size:0.72rem">Cargando...</div>`;
        actEl.innerHTML    = '';
        dotEl.className    = 'fcard-av-dot' + (isOnline ? ' online' : '');

        backdrop.classList.add('open');
        document.body.style.overflow = 'hidden';

        try {
            const res = await fetch(API + '/user/profile/' + encodeURIComponent(username), { headers: auth() });
            const p   = await res.json();

            // Banner background
            const bg = p.profile_background || p.profile_banner;
            if (bg) banner.style.backgroundImage = `url(${esc(bg)})`;

            // Avatar
            let avInner = `<span>${esc((p.username||username).charAt(0).toUpperCase())}</span>`;
            if (p.avatar) avInner = `<img src="${esc(p.avatar)}" alt="" onerror="this.remove()">${avInner}`;
            avEl.innerHTML = avInner;

            nameEl.textContent = p.username || username;
            rankEl.textContent = p.rank_name || '';

            const elo     = p.elo           != null ? p.elo           : '--';
            const solved  = p.solved_count  != null ? p.solved_count  : '--';
            const matches = p.matches_played != null ? p.matches_played : '--';
            const wr      = p.win_rate      != null ? p.win_rate + '%' : '--';

            statsEl.innerHTML = `
                <div class="fcard-stat"><div class="fcard-stat-val">${elo}</div><div class="fcard-stat-key">ELO</div></div>
                <div class="fcard-stat"><div class="fcard-stat-val" style="color:var(--green)">${solved}</div><div class="fcard-stat-key">Resueltos</div></div>
                <div class="fcard-stat"><div class="fcard-stat-val" style="color:rgba(255,255,255,0.6)">${matches}</div><div class="fcard-stat-key">Partidas</div></div>
                <div class="fcard-stat"><div class="fcard-stat-val" style="color:var(--green)">${wr}</div><div class="fcard-stat-key">Win rate</div></div>`;

            actEl.innerHTML = `
                <button class="fcard-btn primary" onclick="closeFriendCard();window.location.href='/perfil?u=${encodeURIComponent(username)}'">Ver perfil</button>`;

        } catch (_) {
            statsEl.innerHTML = `<div style="color:var(--muted);font-size:0.72rem">Error al cargar</div>`;
        }
    };

    window.closeFriendCard = function (e) {
        if (e && e.target !== document.getElementById('fcardBackdrop')) return;
        document.getElementById('fcardBackdrop').classList.remove('open');
        document.body.style.overflow = '';
    };

    // Add friend
    window.sendRequest = async function () {
        const input    = document.getElementById('addInput');
        const feedback = document.getElementById('addFeedback');
        const btn      = document.getElementById('addBtn');
        const username = input.value.trim();
        if (!username) return;

        feedback.className = 'add-feedback';
        feedback.textContent = '';
        btn.disabled = true;

        try {
            const res  = await fetch(API + '/friends/request/' + encodeURIComponent(username), {
                method: 'POST', headers: auth()
            });
            const data = await res.json();
            if (res.ok) {
                feedback.className   = 'add-feedback ok';
                feedback.textContent = 'Solicitud enviada a ' + username;
                input.value = '';
                cache['Amigos'] = false;
                loadAmigos();
            } else {
                feedback.className   = 'add-feedback err';
                feedback.textContent = data.detail || 'Error al enviar la solicitud';
            }
        } catch (_) {
            feedback.className   = 'add-feedback err';
            feedback.textContent = 'Error de conexion';
        } finally {
            btn.disabled = false;
        }
    };

    // Accept / reject / cancel
    window.friendAction = async function (action, username, btn) {
        btn.disabled = true;
        try {
            const res = await fetch(API + '/friends/' + action + '/' + encodeURIComponent(username), {
                method: 'POST', headers: auth()
            });
            if (res.ok) {
                cache['Amigos'] = false;
                loadAmigos();
            } else {
                btn.disabled = false;
            }
        } catch (_) { btn.disabled = false; }
    };

    // Enter key on add input
    document.getElementById('addInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); sendRequest(); }
    });

    // ── TORNEOS ───────────────────────────────────────────────
    async function loadTorneos() {
        const feed = document.getElementById('feedTorneos');
        try {
            const res  = await fetch(API + '/tournaments', { headers: auth() });
            const list = await res.json();
            if (!Array.isArray(list) || !list.length) {
                feed.innerHTML = '<div class="empty-state">No hay torneos disponibles</div>';
            } else {
                feed.innerHTML = list.map(t => tournCard(t)).join('');
            }
        } catch (_) { feed.innerHTML = '<div class="empty-state">Error cargando torneos</div>'; }
        cache['Torneos'] = true;
    }

    function tournCard(t) {
        const statusMap   = { upcoming:'Proximo', active:'Activo', finished:'Finalizado' };
        const statusLabel = statusMap[t.status] || t.status || '';
        const statusClass = t.status || 'upcoming';
        const id          = esc(String(t.id || t._id || ''));
        const participants = t.participants || [];
        const count        = participants.length;
        const max          = t.max_players ? '/' + t.max_players : '';
        const isJoined     = user && participants.includes(user.email);
        const letter       = esc((t.name || 'T').charAt(0).toUpperCase());

        const bannerImg = t.banner_url
            ? `<img src="${esc(t.banner_url)}" alt="" onerror="this.style.opacity=0">`
            : '';

        const date = t.start_time ? fmtDateTime(t.start_time) : '';

        let actionInner = '';
        if (t.status === 'upcoming') {
            if (isJoined) {
                actionInner = `<button class="tourn-action-btn leave" onclick="leaveTournament('${id}',this);event.stopPropagation()">Abandonar</button>`;
            } else {
                actionInner = `<button class="tourn-action-btn join" onclick="joinTournament('${id}',this);event.stopPropagation()">Inscribirse</button>`;
            }
        } else if (t.status === 'active') {
            actionInner = `<button class="tourn-action-btn join" style="opacity:0.45;cursor:default" disabled>En curso</button>`;
        } else {
            actionInner = `<button class="tourn-action-btn join" style="opacity:0.45;cursor:default" disabled>Finalizado</button>`;
        }

        return `<div class="tourn-card" onclick="toggleTournCard(this)">
            <div class="tourn-banner">
                ${bannerImg}
                <div class="tourn-banner-letter">${letter}</div>
                <div class="tourn-banner-fade"></div>
                <span class="tourn-status-badge ${statusClass}">${statusLabel}</span>
            </div>
            <div class="tourn-body">
                <div class="tourn-name">${esc(t.name)}</div>
                <div class="tourn-meta">
                    <span>${count}${max} jugadores</span>
                    ${date ? `<span class="tourn-meta-sep">·</span><span>${date}</span>` : ''}
                </div>
                ${t.description ? `<div class="tourn-desc">${esc(t.description)}</div>` : ''}
                ${isJoined ? `<div class="tourn-joined-pill"><div class="tourn-joined-dot"></div>Inscrito</div>` : ''}
            </div>
            <div class="tourn-action">
                <div class="tourn-action-inner">${actionInner}</div>
            </div>
        </div>`;
    }

    window.toggleTournCard = function (card) {
        card.classList.toggle('open');
    };

    window.joinTournament = async function (id, btn) {
        btn.disabled = true; btn.textContent = 'Uniendo...';
        try {
            const res = await fetch(API + '/tournaments/' + id + '/join', { method:'POST', headers:auth() });
            if (res.ok) {
                cache['Torneos'] = false;
                await loadTorneos();
            } else {
                const d = await res.json();
                btn.textContent = d.detail || 'Error';
                setTimeout(() => { btn.disabled = false; btn.textContent = 'Inscribirse'; }, 2000);
            }
        } catch (_) { btn.textContent = 'Error'; btn.disabled = false; }
    };

    window.leaveTournament = async function (id, btn) {
        btn.disabled = true; btn.textContent = 'Saliendo...';
        try {
            const res = await fetch(API + '/tournaments/' + id + '/leave', { method:'POST', headers:auth() });
            if (res.ok) {
                cache['Torneos'] = false;
                await loadTorneos();
            } else {
                btn.textContent = 'Error';
                setTimeout(() => { btn.disabled = false; btn.textContent = 'Abandonar'; }, 2000);
            }
        } catch (_) { btn.textContent = 'Error'; btn.disabled = false; }
    };

    // ── PERFIL ────────────────────────────────────────────────
    async function loadPerfil() {
        if (!user) return;
        const container = document.getElementById('feedPerfil');

        try {
            const res = await fetch(API + '/user/profile/' + encodeURIComponent(user.username), { headers: auth() });
            const p   = await res.json();
            container.innerHTML = buildProfileHTML(p);
        } catch (_) {
            container.innerHTML = buildProfileHTML(user); // fallback to basic user data
        }
        cache['Perfil'] = true;
    }

    function buildProfileHTML(p) {
        const LANG_ICONS  = { Python:'python', 'C++':'cplusplus', Java:'java', Go:'go', 'C#':'csharp' };
        const LANG_COLORS = { Python:'#4d96ff', 'C++':'#9b5de5', Java:'#ff8c00', Go:'#00d4aa', 'C#':'#c77dff' };

        // ── Hero ──────────────────────────────────────────────
        const initial = esc((p.username||'?').charAt(0).toUpperCase());
        const imgTag  = p.avatar ? `<img src="${esc(p.avatar)}" alt="" onerror="this.remove()">` : '';
        const bannerImg = p.profile_background
            ? `<img class="pf-banner-img" src="${esc(p.profile_background)}" alt="" onerror="this.remove()">`
            : '';

        let badges = '';
        if (p.role === 'admin')      badges += `<span class="pf-role-badge pf-role-admin">ADMIN</span>`;
        else if (p.role === 'moderator') badges += `<span class="pf-role-badge pf-role-mod">MOD</span>`;
        if (p.subscription_plan === 'max')  badges += `<span class="pf-role-badge pf-sub-max">◆ MAX</span>`;
        else if ((p.subscription_plan||'').startsWith('plus')) badges += `<span class="pf-role-badge pf-sub-plus">▲ PLUS</span>`;

        const elo  = p.elo       != null ? p.elo       : '--';
        const rank = p.rank_name || '';

        let html = `
        <div class="pf-banner">
            ${bannerImg}
            <div class="pf-banner-fade"></div>
        </div>
        <div class="pf-identity">
            <div class="pf-av">${imgTag}${initial}</div>
            ${badges ? `<div class="pf-badges">${badges}</div>` : ''}
            <div class="pf-name">${esc(p.username)}</div>
            <div class="pf-email">${esc(p.email || user.email || '')}</div>
            <div class="pf-elo-row">
                <div class="pf-elo">ELO ${elo}</div>
                ${rank ? `<div class="pf-rank">${esc(rank)}</div>` : ''}
            </div>
            ${p.global_rank ? `<div class="pf-global-rank">Posicion global #${p.global_rank}</div>` : ''}
            ${p.description ? `<div class="pf-desc">${esc(p.description)}</div>` : ''}
            ${buildLangIcons(p.languages, LANG_ICONS)}
        </div>`;

        // ── Ranked ────────────────────────────────────────────
        const mp  = p.matches_played || 0;
        const wr  = mp > 0 ? (p.win_rate || 0) + '%' : '--';
        html += `
        <div class="pf-section">
            <div class="pf-section-label">// Ranked</div>
            <div class="pf-grid">
                <div class="pf-stat"><div class="pf-stat-val">${mp}</div><div class="pf-stat-key">Partidas</div></div>
                <div class="pf-stat"><div class="pf-stat-val green">${p.wins||0}</div><div class="pf-stat-key">Victorias</div></div>
                <div class="pf-stat"><div class="pf-stat-val ${mp>0?'green':'muted'}">${wr}</div><div class="pf-stat-key">Win Rate</div></div>
                <div class="pf-stat"><div class="pf-stat-val cyan">${elo}</div><div class="pf-stat-key">ELO actual</div></div>
                <div class="pf-stat"><div class="pf-stat-val">${p.max_elo||'--'}</div><div class="pf-stat-key">ELO maximo</div></div>
                <div class="pf-stat"><div class="pf-stat-val">${esc(p.max_rank_name||'--')}</div><div class="pf-stat-key">Rango max</div></div>
            </div>
        </div>`;

        // ── Ejercicios ────────────────────────────────────────
        const solved = p.solved_count || 0;
        const byDiff = p.solved_by_difficulty || {};
        const DIFF_CONFIG = [
            { key:'Fácil',       label:'800–1200',  cls:'d-facil'  },
            { key:'Normal',      label:'1200–1800', cls:'d-normal' },
            { key:'Difícil',     label:'1800–2400', cls:'d-dif'    },
            { key:'Muy Difícil', label:'2400–3000', cls:'d-muydif' },
            { key:'Insane',      label:'3000–3500', cls:'d-insane' },
            { key:'Abyssal',     label:'3500+',     cls:'d-abyss'  },
        ];
        const diffMax = Math.max(...Object.values(byDiff), 1);
        const diffRows = DIFF_CONFIG.map(d => {
            const n = byDiff[d.key] || 0;
            const w = n > 0 ? Math.max(Math.round(n / diffMax * 100), 4) : 0;
            return `<div class="diff-row">
                <span class="diff-label">${d.label}</span>
                <div class="diff-track"><div class="diff-fill ${d.cls}" style="width:${w}%"></div></div>
                <span class="diff-count">${n||''}</span>
            </div>`;
        }).join('');

        // Language bar
        const langStats  = p.lang_stats || {};
        const langTotal  = Object.values(langStats).reduce((a,b) => a+b, 0);
        let   langBarHTML = '', langLegendHTML = '';
        if (langTotal > 0) {
            langBarHTML = `<div class="lang-bar">` +
                Object.entries(langStats).filter(([,v])=>v>0).map(([l,n]) => {
                    const pct   = (n/langTotal*100).toFixed(1);
                    const color = LANG_COLORS[l] || '#888';
                    return `<div class="lang-segment" style="width:${pct}%;background:${color}" title="${esc(l)}"></div>`;
                }).join('') + `</div>`;
            langLegendHTML = `<div class="lang-legend">` +
                Object.entries(langStats).filter(([,v])=>v>0).map(([l,n]) => {
                    const pct   = Math.round(n/langTotal*100);
                    const color = LANG_COLORS[l] || '#888';
                    return `<span class="lang-legend-item"><span class="lang-legend-dot" style="background:${color}"></span>${esc(l)} ${pct}%</span>`;
                }).join('') + `</div>`;
        }

        html += `
        <div class="pf-section" style="margin-top:20px">
            <div class="pf-section-label">// Ejercicios — ${solved} resueltos</div>
            ${diffRows}
            ${langBarHTML ? `<div style="margin-top:14px">${langBarHTML}${langLegendHTML}</div>` : ''}
        </div>`;

        // ── Bot ───────────────────────────────────────────────
        const bm = p.bot_matches || 0;
        const bw = p.bot_wins    || 0;
        const bwr = bm > 0 ? (p.bot_winrate || 0) + '%' : '--';
        html += `
        <div class="pf-section" style="margin-top:20px">
            <div class="pf-section-label">// Vs CPU</div>
            <div class="pf-grid">
                <div class="pf-stat"><div class="pf-stat-val">${bm}</div><div class="pf-stat-key">Partidas</div></div>
                <div class="pf-stat"><div class="pf-stat-val green">${bw}</div><div class="pf-stat-key">Victorias</div></div>
                <div class="pf-stat"><div class="pf-stat-val ${bm>0?'green':'muted'}">${bwr}</div><div class="pf-stat-key">Win Rate</div></div>
            </div>
        </div>`;

        // ── Supervivencia ──────────────────────────────────────
        const sv = (p.survival_stats && p.survival_stats.survival) || {};
        function fmtT(s) { if(!s)return'—'; return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0'); }
        const so = { g:sv.solo_games||0, t:fmtT(sv.solo_max_time_survived), e:sv.solo_max_exercises||0 };
        const co = { g:sv.coop_games||0, t:fmtT(sv.coop_max_time_survived), e:sv.coop_max_exercises||0 };
        html += `
        <div class="pf-section" style="margin-top:20px">
            <div class="pf-section-label">// Supervivencia</div>
            <div class="pf-subsec-label">Solo</div>
            <div class="pf-grid">
                <div class="pf-stat"><div class="pf-stat-val">${so.g}</div><div class="pf-stat-key">Partidas</div></div>
                <div class="pf-stat"><div class="pf-stat-val ${sv.solo_max_time_survived?'green':'muted'}">${so.t}</div><div class="pf-stat-key">Mejor tiempo</div></div>
                <div class="pf-stat"><div class="pf-stat-val ${sv.solo_max_exercises?'green':'muted'}">${so.e||'—'}</div><div class="pf-stat-key">Max ejercs</div></div>
            </div>
            <div class="pf-subsec-label">Cooperativo</div>
            <div class="pf-grid">
                <div class="pf-stat"><div class="pf-stat-val">${co.g}</div><div class="pf-stat-key">Partidas</div></div>
                <div class="pf-stat"><div class="pf-stat-val ${sv.coop_max_time_survived?'green':'muted'}">${co.t}</div><div class="pf-stat-key">Mejor tiempo</div></div>
                <div class="pf-stat"><div class="pf-stat-val ${sv.coop_max_exercises?'green':'muted'}">${co.e||'—'}</div><div class="pf-stat-key">Max ejercs</div></div>
            </div>
        </div>`;

        // ── Torneos ────────────────────────────────────────────
        const tj  = p.tournaments_joined      || 0;
        const tw  = p.tournament_wins         || 0;
        const twr = tj > 0 ? (p.tournament_winrate||0) + '%' : '--';
        const tmw = p.tournament_match_wins   || 0;
        const tml = p.tournament_match_losses || 0;
        html += `
        <div class="pf-section" style="margin-top:20px">
            <div class="pf-section-label">// Torneos</div>
            <div class="pf-grid">
                <div class="pf-stat"><div class="pf-stat-val">${tj}</div><div class="pf-stat-key">Jugados</div></div>
                <div class="pf-stat"><div class="pf-stat-val blue">${tw}</div><div class="pf-stat-key">Ganados</div></div>
                <div class="pf-stat"><div class="pf-stat-val ${tj>0?'blue':'muted'}">${twr}</div><div class="pf-stat-key">Win Rate</div></div>
            </div>
        </div>`;

        // ── Team ───────────────────────────────────────────────
        if (p.team) {
            const tav = p.team.photo_url
                ? `style="background-image:url(${esc(p.team.photo_url)});background-size:cover;"`
                : '';
            const tinit = esc((p.team.name||'?').charAt(0).toUpperCase());
            html += `
            <div class="pf-section" style="margin-top:20px">
                <div class="pf-section-label">// Club</div>
                <a class="pf-team" href="/equipo?t=${encodeURIComponent(p.team.name)}">
                    <div class="pf-team-av" ${tav}>${tav?'':tinit}</div>
                    <div>
                        <div class="pf-team-name">${esc(p.team.name)}</div>
                        <div class="pf-team-label">Ver club</div>
                    </div>
                </a>
            </div>`;
        }

        // ── Social links ───────────────────────────────────────
        const SOCIAL_CFG = [
            { key:'github',     label:'GitHub',     icon:'https://cdn.simpleicons.org/github/ffffff' },
            { key:'codeforces', label:'Codeforces', icon:'https://cdn.simpleicons.org/codeforces/ffffff' },
            { key:'instagram',  label:'Instagram',  icon:'https://cdn.simpleicons.org/instagram/ffffff' },
            { key:'tiktok',     label:'TikTok',     icon:'https://cdn.simpleicons.org/tiktok/ffffff' },
            { key:'linkedin',   label:'LinkedIn',   icon:'https://cdn.simpleicons.org/linkedin/ffffff' },
        ];
        const sl = p.social_links || {};
        const activeSocials = SOCIAL_CFG.filter(s => sl[s.key]);
        if (activeSocials.length) {
            html += `
            <div class="pf-section" style="margin-top:20px">
                <div class="pf-section-label">// Redes</div>
                <div class="pf-socials">
                    ${activeSocials.map(s => `
                    <a class="pf-social" href="${esc(sl[s.key])}" target="_blank" rel="noopener">
                        <img src="${s.icon}" alt="${s.label}"> ${s.label}
                    </a>`).join('')}
                </div>
            </div>`;
        }

        // ── Achievements ───────────────────────────────────────
        const achs = (p.equipped_achievements||[]).filter(Boolean);
        if (achs.length) {
            html += `
            <div class="pf-section" style="margin-top:20px">
                <div class="pf-section-label">// Logros</div>
                <div class="pf-ach-list">
                    ${achs.map(a => `
                    <div class="pf-ach">
                        <span class="pf-ach-icon">${a.icon||''}</span>
                        <div>
                            <div class="pf-ach-title">${esc(a.title||'')}</div>
                            <div class="pf-ach-rarity rarity-${esc(a.rarity||'common')}">${esc((a.rarity||'').toUpperCase())}</div>
                        </div>
                    </div>`).join('')}
                </div>
            </div>`;
        }

        // ── Actions ────────────────────────────────────────────
        html += `
        <div class="pf-actions">
            <button class="pf-action-btn danger" onclick="logout()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Cerrar sesion
            </button>
        </div>`;

        return html;
    }

    function buildLangIcons(languages, LANG_ICONS) {
        if (!languages || !languages.length) return '';
        const icons = languages.map(l => {
            const icon = LANG_ICONS[l];
            return icon
                ? `<img class="pf-lang-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/${icon}/${icon}-original.svg" title="${esc(l)}" alt="${esc(l)}">`
                : '';
        }).filter(Boolean).join('');
        return icons ? `<div class="pf-lang-icons" style="margin-top:6px">${icons}</div>` : '';
    }

    window.logout = function () {
        localStorage.removeItem('access_token');
        localStorage.removeItem('username');
        window.location.replace('/mobile/auth');
    };

    init();
})();
</script>
</body>
</html>
