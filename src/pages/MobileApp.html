<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codexar</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cyan:   #00ffcc;
            --bg:     #080810;
            --surface:#0f0f1a;
            --card:   #12121d;
            --border: rgba(255,255,255,0.06);
            --text:   #e4e4f0;
            --muted:  rgba(255,255,255,0.38);
            --mono:   'JetBrains Mono', monospace;
            --sans:   'Inter', sans-serif;
        }

        html, body {
            height: 100%; height: 100dvh;
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── LAYOUT ── */
        .app {
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        .app-header {
            flex-shrink: 0;
            height: calc(52px + env(safe-area-inset-top));
            padding-top: env(safe-area-inset-top);
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 20px; padding-right: 16px;
            background: rgba(8,8,16,0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            position: relative; z-index: 10;
        }
        .header-title {
            font-family: var(--mono);
            font-size: 0.9rem; font-weight: 700;
            letter-spacing: -0.3px;
        }
        .header-av {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(0,255,204,0.08);
            border: 1px solid rgba(0,255,204,0.2);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono);
            font-size: 0.78rem; font-weight: 700;
            color: var(--cyan);
            background-size: cover; background-position: center;
            cursor: pointer; overflow: hidden;
            flex-shrink: 0;
        }

        /* ── MAIN SCROLL AREA ── */
        .app-main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            flex-shrink: 0;
            display: flex;
            background: rgba(8,8,16,0.97);
            border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 4px;
            padding: 10px 4px 8px;
            border: none; background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: color 0.15s;
            font-family: var(--sans);
            -webkit-tap-highlight-color: transparent;
        }
        .nav-btn.active { color: var(--cyan); }
        .nav-btn svg { transition: transform 0.15s; }
        .nav-btn.active svg { transform: translateY(-1px); }
        .nav-label {
            font-size: 0.6rem; font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* ── SHARED FEED STYLES ── */
        .feed {
            padding: 16px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .section-eyebrow {
            font-family: var(--mono);
            font-size: 0.55rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            color: rgba(0,255,204,0.4);
            padding: 20px 20px 4px;
        }

        /* skeleton */
        .skel {
            background: linear-gradient(90deg, var(--card) 25%, rgba(255,255,255,0.04) 50%, var(--card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
        .skel-line { height: 12px; margin-bottom: 8px; }
        .skel-block { height: 80px; margin-bottom: 10px; border-radius: 12px; }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        /* ── NEWS CARDS ── */
        .news-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: border-color 0.15s;
        }
        .news-card:active { border-color: rgba(0,255,204,0.15); }
        .news-card-meta {
            font-family: var(--mono);
            font-size: 0.58rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: rgba(0,255,204,0.4);
            margin-bottom: 8px;
        }
        .news-card-title {
            font-size: 0.96rem; font-weight: 700;
            line-height: 1.3;
            margin-bottom: 6px;
        }
        .news-card-sub {
            font-size: 0.82rem; color: var(--muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── FRIENDS ── */
        .friends-header {
            font-family: var(--mono);
            font-size: 0.6rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--muted);
            padding: 20px 20px 8px;
        }
        .friends-header span { color: var(--cyan); }

        .friend-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .friend-av-wrap {
            position: relative; flex-shrink: 0;
        }
        .friend-av {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono);
            font-size: 0.85rem; font-weight: 700;
            color: var(--muted);
            overflow: hidden;
            background-size: cover; background-position: center;
        }
        .friend-dot {
            position: absolute; bottom: 1px; right: 1px;
            width: 10px; height: 10px; border-radius: 50%;
            border: 2px solid var(--bg);
            background: rgba(255,255,255,0.18);
        }
        .friend-dot.online { background: #22c55e; }
        .friend-info { flex: 1; min-width: 0; }
        .friend-name {
            font-family: var(--mono);
            font-size: 0.82rem; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .friend-status {
            font-size: 0.72rem; color: var(--muted);
            margin-top: 2px;
        }
        .friend-status.online { color: #22c55e; }
        .friend-elo {
            font-family: var(--mono);
            font-size: 0.68rem; font-weight: 700;
            color: rgba(0,255,204,0.5);
            white-space: nowrap;
        }

        .friends-section-label {
            font-family: var(--mono);
            font-size: 0.55rem; font-weight: 700;
            letter-spacing: 2.5px; text-transform: uppercase;
            color: rgba(255,255,255,0.18);
            padding: 4px 4px 8px;
        }

        /* ── TOURNAMENTS ── */
        .tourn-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .tourn-top {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 10px;
        }
        .tourn-name {
            font-family: var(--mono);
            font-size: 0.88rem; font-weight: 700;
            line-height: 1.3;
            flex: 1;
        }
        .tourn-badge {
            font-family: var(--mono);
            font-size: 0.52rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 4px 8px; border-radius: 4px;
            white-space: nowrap; flex-shrink: 0;
        }
        .tourn-badge.waiting  { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
        .tourn-badge.active   { background: rgba(34,197,94,0.1);  color: #22c55e;  border: 1px solid rgba(34,197,94,0.2); }
        .tourn-badge.finished { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }
        .tourn-meta {
            display: flex; align-items: center; gap: 14px;
            font-size: 0.76rem; color: var(--muted);
        }
        .tourn-meta svg { vertical-align: middle; margin-right: 4px; }
        .tourn-join {
            font-family: var(--mono);
            font-size: 0.68rem; font-weight: 700;
            padding: 8px 14px; border-radius: 7px;
            border: 1px solid rgba(0,255,204,0.25);
            background: rgba(0,255,204,0.06);
            color: var(--cyan);
            cursor: pointer; align-self: flex-start;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .tourn-join:active { background: rgba(0,255,204,0.12); }

        /* ── PROFILE ── */
        .profile-hero {
            padding: 32px 20px 24px;
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .profile-av {
            width: 76px; height: 76px; border-radius: 50%;
            background: rgba(0,255,204,0.06);
            border: 2px solid rgba(0,255,204,0.2);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono);
            font-size: 1.8rem; font-weight: 800;
            color: var(--cyan);
            overflow: hidden;
            background-size: cover; background-position: center;
        }
        .profile-name {
            font-family: var(--mono);
            font-size: 1.15rem; font-weight: 800; letter-spacing: -0.5px;
        }
        .profile-email {
            font-size: 0.76rem; color: var(--muted);
        }
        .profile-elo {
            font-family: var(--mono);
            font-size: 0.65rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 20px;
            background: rgba(0,255,204,0.06);
            border: 1px solid rgba(0,255,204,0.18);
            color: var(--cyan);
        }

        .profile-stats {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 0 16px 16px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 10px;
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
        }
        .stat-val {
            font-family: var(--mono);
            font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px;
        }
        .stat-label {
            font-size: 0.65rem; color: var(--muted);
            text-align: center;
        }

        .profile-actions {
            padding: 0 16px 32px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .profile-action-btn {
            font-family: var(--mono);
            font-size: 0.78rem; font-weight: 700;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            display: flex; align-items: center; gap: 12px;
            cursor: pointer;
            transition: border-color 0.15s;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
        }
        .profile-action-btn:active { border-color: rgba(0,255,204,0.2); }
        .profile-action-btn svg { color: var(--muted); flex-shrink: 0; }
        .profile-action-btn.danger { color: #f87171; border-color: rgba(248,113,113,0.15); }
        .profile-action-btn.danger svg { color: rgba(248,113,113,0.5); }
        .profile-action-btn.danger:active { border-color: rgba(248,113,113,0.3); }
    </style>
</head>
<body>

<div class="app">

    <!-- Header -->
    <header class="app-header">
        <div class="header-title" id="headerTitle">Noticias</div>
        <div class="header-av" id="headerAv" onclick="switchTab('Perfil')"></div>
    </header>

    <!-- Screens -->
    <main class="app-main">

        <!-- NOTICIAS -->
        <div class="screen active" id="screenNoticias">
            <div class="section-eyebrow">// Novedades</div>
            <div class="feed" id="feedNoticias">
                <div class="skel skel-block"></div>
                <div class="skel skel-block"></div>
                <div class="skel skel-block"></div>
            </div>
        </div>

        <!-- AMIGOS -->
        <div class="screen" id="screenAmigos">
            <div class="friends-header" id="friendsHeader">Amigos</div>
            <div class="feed" id="feedAmigos">
                <div class="skel skel-block"></div>
                <div class="skel skel-block"></div>
                <div class="skel skel-block"></div>
            </div>
        </div>

        <!-- TORNEOS -->
        <div class="screen" id="screenTorneos">
            <div class="section-eyebrow">// Torneos activos y proximos</div>
            <div class="feed" id="feedTorneos">
                <div class="skel skel-block"></div>
                <div class="skel skel-block"></div>
            </div>
        </div>

        <!-- PERFIL -->
        <div class="screen" id="screenPerfil">
            <div id="feedPerfil">
                <div class="profile-hero">
                    <div class="profile-av skel" style="width:76px;height:76px;border-radius:50%;"></div>
                    <div class="skel skel-line" style="width:120px;height:18px;"></div>
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
        <button class="nav-btn active" id="nb-Noticias" onclick="switchTab('Noticias')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>
                <path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/>
            </svg>
            <span class="nav-label">Noticias</span>
        </button>
        <button class="nav-btn" id="nb-Amigos" onclick="switchTab('Amigos')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span class="nav-label">Amigos</span>
        </button>
        <button class="nav-btn" id="nb-Torneos" onclick="switchTab('Torneos')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                <path d="M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
            </svg>
            <span class="nav-label">Torneos</span>
        </button>
        <button class="nav-btn" id="nb-Perfil" onclick="switchTab('Perfil')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="nav-label">Perfil</span>
        </button>
    </nav>

</div>

<script>
(function () {
    const API  = 'https://api.codexar.es/api';
    const tok  = () => localStorage.getItem('access_token');
    const auth = () => ({ 'Authorization': 'Bearer ' + tok() });

    function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmtDate(iso) {
        if (!iso) return '';
        return new Date(iso).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
    }
    function fmtDateTime(iso) {
        if (!iso) return '';
        return new Date(iso).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    let user  = null;
    let cache = {};
    let activeTab = 'Noticias';

    // ── Init ─────────────────────────────────────────────────
    async function init() {
        if (!tok()) { window.location.replace('/mobile/auth'); return; }

        try {
            const res = await fetch(API + '/user/me', { headers: auth() });
            if (!res.ok) { localStorage.removeItem('access_token'); window.location.replace('/mobile/auth'); return; }
            user = await res.json();
        } catch (_) {
            window.location.replace('/mobile/auth'); return;
        }

        // Render header avatar
        const av = document.getElementById('headerAv');
        if (user.avatar) {
            av.style.backgroundImage = 'url(' + user.avatar + ')';
        } else {
            av.textContent = (user.username || '?').charAt(0).toUpperCase();
        }

        loadTab('Noticias');
    }

    // ── Tab switching ─────────────────────────────────────────
    window.switchTab = function (tab) {
        if (tab === activeTab && cache[tab]) return;

        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + tab).classList.add('active');

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('nb-' + tab).classList.add('active');

        document.getElementById('headerTitle').textContent = tab;
        activeTab = tab;
        loadTab(tab);
    };

    function loadTab(tab) {
        if (cache[tab]) return;
        switch (tab) {
            case 'Noticias': loadNoticias(); break;
            case 'Amigos':   loadAmigos();   break;
            case 'Torneos':  loadTorneos();  break;
            case 'Perfil':   loadPerfil();   break;
        }
    }

    // ── NOTICIAS ─────────────────────────────────────────────
    async function loadNoticias() {
        const feed = document.getElementById('feedNoticias');
        try {
            const res   = await fetch(API + '/news/', { headers: auth() });
            const items = await res.json();
            if (!Array.isArray(items) || items.length === 0) {
                feed.innerHTML = '<div class="empty-state">Sin noticias</div>';
            } else {
                const lang = localStorage.getItem('codexar_lang') || 'es';
                feed.innerHTML = items.map(n => {
                    const title    = (n.title_i18n && n.title_i18n[lang])    || n.title    || '';
                    const subtitle = (n.subtitle_i18n && n.subtitle_i18n[lang]) || n.subtitle || '';
                    return `<div class="news-card">
                        <div class="news-card-meta">${esc(n.author_username || 'Codexar')} &middot; ${fmtDate(n.created_at)}</div>
                        <div class="news-card-title">${esc(title)}</div>
                        ${subtitle ? '<div class="news-card-sub">' + esc(subtitle) + '</div>' : ''}
                    </div>`;
                }).join('');
            }
        } catch (_) {
            feed.innerHTML = '<div class="empty-state">Error cargando noticias</div>';
        }
        cache['Noticias'] = true;
    }

    // ── AMIGOS ───────────────────────────────────────────────
    async function loadAmigos() {
        const feed   = document.getElementById('feedAmigos');
        const header = document.getElementById('friendsHeader');
        try {
            const res     = await fetch(API + '/friends', { headers: auth() });
            const friends = await res.json();
            if (!Array.isArray(friends) || friends.length === 0) {
                feed.innerHTML = '<div class="empty-state">Todavia no tienes amigos en Codexar</div>';
                header.innerHTML = 'Amigos';
            } else {
                const online  = friends.filter(f => f.is_online);
                const offline = friends.filter(f => !f.is_online);
                header.innerHTML = 'Amigos &nbsp;<span>' + online.length + ' online</span>';

                let html = '';
                if (online.length) {
                    html += '<div class="friends-section-label">Conectados</div>';
                    html += online.map(f => friendCard(f)).join('');
                }
                if (offline.length) {
                    html += '<div class="friends-section-label" style="margin-top:8px">Desconectados</div>';
                    html += offline.map(f => friendCard(f)).join('');
                }
                feed.innerHTML = html;
            }
        } catch (_) {
            feed.innerHTML = '<div class="empty-state">Error cargando amigos</div>';
        }
        cache['Amigos'] = true;
    }

    function friendCard(f) {
        const initial = (f.username || '?').charAt(0).toUpperCase();
        const avStyle = f.avatar
            ? 'background-image:url(' + f.avatar + ');background-size:cover;'
            : '';
        const avContent = f.avatar ? '' : initial;
        const online = !!f.is_online;
        return `<div class="friend-item">
            <div class="friend-av-wrap">
                <div class="friend-av" style="${avStyle}">${avContent}</div>
                <div class="friend-dot ${online ? 'online' : ''}"></div>
            </div>
            <div class="friend-info">
                <div class="friend-name">${esc(f.username)}</div>
                <div class="friend-status ${online ? 'online' : ''}">${online ? 'En linea' : esc(f.last_seen_text || 'Desconectado')}</div>
            </div>
            ${f.elo ? '<div class="friend-elo">ELO ' + f.elo + '</div>' : ''}
        </div>`;
    }

    // ── TORNEOS ──────────────────────────────────────────────
    async function loadTorneos() {
        const feed = document.getElementById('feedTorneos');
        try {
            const res      = await fetch(API + '/tournaments', { headers: auth() });
            const torneos  = await res.json();
            const list     = Array.isArray(torneos) ? torneos : (torneos.tournaments || []);
            if (!list.length) {
                feed.innerHTML = '<div class="empty-state">No hay torneos disponibles</div>';
            } else {
                feed.innerHTML = list.map(t => tournCard(t)).join('');
            }
        } catch (_) {
            feed.innerHTML = '<div class="empty-state">Error cargando torneos</div>';
        }
        cache['Torneos'] = true;
    }

    function tournCard(t) {
        const statusMap = { waiting: 'Esperando', active: 'Activo', finished: 'Finalizado' };
        const statusLabel = statusMap[t.status] || t.status || '';
        const statusClass = t.status || 'waiting';
        const count = t.participants_count != null ? t.participants_count : (t.players ? t.players.length : '?');
        const max   = t.max_players ? '/' + t.max_players : '';
        return `<div class="tourn-card">
            <div class="tourn-top">
                <div class="tourn-name">${esc(t.name)}</div>
                <span class="tourn-badge ${statusClass}">${statusLabel}</span>
            </div>
            <div class="tourn-meta">
                <span>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    </svg>${count}${max} jugadores
                </span>
                ${t.starts_at ? '<span>' + fmtDateTime(t.starts_at) + '</span>' : ''}
            </div>
            ${t.status === 'waiting' ? '<button class="tourn-join" onclick="joinTourn(\'' + (t._id || t.id) + '\', this)">Unirse</button>' : ''}
        </div>`;
    }

    window.joinTourn = async function (id, btn) {
        btn.disabled = true;
        btn.textContent = 'Uniendo...';
        try {
            const res = await fetch(API + '/tournaments/' + id + '/join', { method: 'POST', headers: auth() });
            if (res.ok) {
                btn.textContent = 'Unido';
                btn.style.opacity = '0.5';
            } else {
                const d = await res.json();
                btn.textContent = d.detail || 'Error';
                btn.disabled = false;
            }
        } catch (_) {
            btn.textContent = 'Error';
            btn.disabled = false;
        }
    };

    // ── PERFIL ───────────────────────────────────────────────
    function loadPerfil() {
        if (!user) return;
        const container = document.getElementById('feedPerfil');

        const initial = (user.username || '?').charAt(0).toUpperCase();
        const avStyle = user.avatar
            ? 'background-image:url(' + user.avatar + ');background-size:cover;'
            : '';
        const avContent = user.avatar ? '' : initial;

        const elo     = user.elo   != null ? user.elo   : '--';
        const wins    = user.wins  != null ? user.wins  : '--';
        const matches = user.total_matches != null ? user.total_matches : (user.games_played != null ? user.games_played : '--');
        const losses  = user.losses != null ? user.losses : '--';

        container.innerHTML = `
        <div class="profile-hero">
            <div class="profile-av" style="${avStyle}">${avContent}</div>
            <div class="profile-name">${esc(user.username)}</div>
            <div class="profile-email">${esc(user.email || '')}</div>
            <div class="profile-elo">ELO ${elo}</div>
        </div>
        <div class="profile-stats">
            <div class="stat-card">
                <div class="stat-val">${matches}</div>
                <div class="stat-label">Partidas</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">${wins}</div>
                <div class="stat-label">Victorias</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">${losses}</div>
                <div class="stat-label">Derrotas</div>
            </div>
        </div>
        <div class="profile-actions">
            <button class="profile-action-btn danger" onclick="logout()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Cerrar sesion
            </button>
        </div>`;

        cache['Perfil'] = true;
    }

    window.logout = function () {
        localStorage.removeItem('access_token');
        localStorage.removeItem('username');
        window.location.replace('/mobile/auth');
    };

    init();
})();
</script>

</body>
</html>
