<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codexar - Iniciar Sesión</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/Auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <div class="brand">Codex<span>ar</span></div>
            <p>Inicia sesión en tu cuenta</p>
        </div>
        
        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="hacker@codexar.dev" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="error-message" id="errorMessage">Correo o contraseña incorrectos.</div>
            
            <button type="submit" class="btn" id="loginBtn">Acceder</button>
        </form>
        
        <div class="auth-footer">
            ¿No tienes cuenta? <a href="Register.html">Regístrate aquí</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../services/auth.js"></script>
</body>
</html>
