<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codexar - Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/Home.css">
    <link rel="stylesheet" href="../assets/css/Onboarding.css">
    <link rel="stylesheet" href="../assets/css/Profile.css">
    <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body class="profile-body">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand" onclick="window.location.href='Home.html'" style="cursor:pointer;">Codex<span>ar</span></div>
        <div class="user-pill-container">
            <div class="user-pill" id="userPill">
                <div class="avatar" id="navAvatar"></div>
                <div class="username-display" id="navUsername">Cargando...</div>
            </div>
            <div class="user-dropdown">
                <a href="Home.html" class="dropdown-item">Inicio</a>
                <a href="Profile.html" class="dropdown-item">Perfil</a>
                <a href="Logros.html" class="dropdown-item">Logros</a>
                <a href="Tienda.html" class="dropdown-item">Tienda</a>
                <a href="Friends.html" class="dropdown-item">Amigos</a>
                <a href="Leaderboard.html" class="dropdown-item">Clasificación</a>
                <a href="#" class="dropdown-item">Ayuda</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <main class="profile-container">
        <div class="profile-card">
            <h1>Configuración de Perfil</h1>

            <form id="profileForm" class="profile-form">

                <!-- Avatar -->
                <div class="avatar-section">
                    <div class="avatar-wrapper" id="avatarWrapper">
                        <img id="avatarPreview" src="" alt="Avatar">
                        <label for="pfpInput" class="avatar-edit-overlay">
                            <span><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></span>
                        </label>
                        <input type="file" id="pfpInput" accept="image/png, image/jpeg, image/gif" hidden>
                    </div>
                </div>

                <div class="input-grid">
                    <div class="input-group">
                        <label>Nombre de Usuario</label>
                        <div class="editable-wrapper">
                            <input type="text" id="usernameInput" class="custom-input" readonly autocomplete="off">
                            <button type="button" class="btn-edit" onclick="toggleEdit('usernameInput')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button>
                        </div>
                        <span id="usernameStatus" class="status-msg"></span>
                    </div>
                    <div class="input-group">
                        <label>Descripción (Máximo 30 caracteres)</label>
                        <div class="editable-wrapper">
                            <input type="text" id="descInput" class="custom-input" maxlength="30" readonly autocomplete="off">
                            <button type="button" class="btn-edit" onclick="toggleEdit('descInput')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button>
                        </div>
                    </div>
                </div>

                <div class="languages-section">
                    <label class="langs-label">
                        <span>Stack Tecnológico principal</span>
                        <button type="button" class="btn-edit-static" onclick="toggleLangEdit()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button>
                    </label>
                    <div class="languages-grid disabled-grid" id="langsGrid"></div>
                </div>

                <div class="security-section">
                    <h3 class="section-h3">Seguridad</h3>
                    <div class="password-grid">
                        <div class="input-group">
                            <label>Clave Maestra Actual</label>
                            <div class="editable-wrapper pwd-row">
                                <input type="password" id="oldPasswordInput" class="custom-input" autocomplete="off" placeholder="Escribe tu clave...">
                                <button type="button" id="verifyPwdBtn" class="btn btn-secondary verify-btn">Verificar</button>
                            </div>
                            <span id="pwdStatusIcon" class="status-msg pwd-status"></span>
                        </div>
                        <div class="input-group">
                            <label>Nueva Clave Mnemótica</label>
                            <input type="password" id="newPasswordInput" class="custom-input new-pwd" autocomplete="off" disabled placeholder="Bloqueado">
                        </div>
                    </div>
                </div>

                <div class="profile-actions">
                    <p id="globalFeedback" class="status-msg" style="flex:1; padding-top:10px;"></p>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='Home.html'">Cancelar</button>
                    <button type="submit" class="btn btn-green" id="saveProfileBtn" disabled>Guardar Cambios</button>
                </div>
            </form>

            <!-- Fondo de perfil — outside form -->
            <div class="pp-bg-section">
                <h3>Fondo de Perfil</h3>
                <p>Sube una imagen animada (GIF) o estática para tu perfil público.</p>
                <div class="editable-wrapper" style="gap:10px;">
                    <input type="file" id="bgInput" accept="image/*" class="custom-input" style="padding:8px; cursor:pointer;">
                    <button type="button" class="btn btn-secondary" id="uploadBgBtn" style="padding:10px 15px; font-size:0.8rem; white-space:nowrap;">Subir</button>
                </div>
                <span id="bgUploadStatus" class="status-msg" style="display:block; margin-top:6px;"></span>
            </div>
        </div>

        <!-- Ver mi perfil — outside card, centered -->
        <button class="pp-view-btn" id="viewPublicProfileBtn">Ver mi perfil público →</button>
    </main>

    <script src="../services/matchmakingGlobal.js"></script>
    <script src="../services/profile.js"></script>
    <script src="../services/globalBg.js"></script>
</body>
</html>
