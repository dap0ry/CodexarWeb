<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../services/themeService.js"></script>
    <title>Codexar — Supervivencia</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/SolvePage.css">
    <link rel="stylesheet" href="../assets/css/SupervivenciaBattle.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/theme-light.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand" onclick="confirmLeave()" style="cursor:pointer;">Codex<span>ar</span></div>
        <div class="user-pill-container">
            <div class="user-pill" id="userPill">
                <div class="avatar" id="navAvatar"></div>
                <div class="username-display" id="navUsername">Cargando...</div>
            </div>
            <div class="user-dropdown">
                <a href="Home.html"        class="dropdown-item">Inicio</a>
                <a href="Profile.html"     class="dropdown-item">Perfil</a>
                <a href="Logros.html"      class="dropdown-item">Logros</a>
                <a href="Friends.html"     class="dropdown-item">Amigos</a>
                <a href="Leaderboard.html" class="dropdown-item">Clasificación</a>
                <a href="Tema.html"        class="dropdown-item">Tema</a>
                <a href="#"                class="dropdown-item">Ayuda</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <!-- Survival Header Bar -->
    <div class="surv-header-bar">
        <div class="surv-header-left">
            <span class="surv-mode-label">SUPERVIVENCIA</span>
            <span class="surv-sep">·</span>
            <span class="surv-diff-label" id="survDiffLabel">NORMAL</span>
            <span class="surv-sep">·</span>
            <span class="surv-ex-label">Ejercicio <span id="survExNum">#1</span></span>
        </div>
        <div class="surv-timer-display" id="survTimer">01:00</div>
    </div>

    <!-- Players Bar -->
    <div class="surv-players-bar" id="survPlayersBar">
        <!-- Injected by JS -->
    </div>

    <!-- Main Solve Layout -->
    <main class="solve-main surv-solve-main">
        <!-- Left Panel: Statement + Test Cases -->
        <div class="solve-left">
            <div class="solve-statement">
                <div class="statement-header">
                    <div class="statement-title" id="exTitle">Cargando ejercicio...</div>
                    <div class="statement-badges" id="exBadges"></div>
                </div>
                <div class="statement-body" id="exDescription">Cargando enunciado...</div>
            </div>
            <div class="solve-testcases">
                <div class="testcases-label">Casos de Prueba</div>
                <div id="testCasesList" class="testcases-list"></div>
            </div>
        </div>

        <!-- Right Panel: Code Editor -->
        <div class="solve-right">
            <div class="editor-toolbar">
                <div class="lang-pills" id="langPills">
                    <button class="lang-pill active" data-lang="Python">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" alt="Python">
                        Python
                    </button>
                    <button class="lang-pill" data-lang="C++">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg" alt="C++">
                        C++
                    </button>
                    <button class="lang-pill" data-lang="Java">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg" alt="Java">
                        Java
                    </button>
                    <button class="lang-pill" data-lang="Go">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/go/go-original.svg" alt="Go">
                        Go
                    </button>
                    <button class="lang-pill" data-lang="C#">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/csharp/csharp-original.svg" alt="C#">
                        C#
                    </button>
                </div>
                <div class="editor-status" id="editorStatus"></div>
            </div>

            <div class="editor-wrapper">
                <div id="codeEditor"></div>
            </div>

            <div class="editor-output" id="editorOutput" style="display:none;">
                <div id="outputContent"></div>
            </div>

            <div class="editor-actions">
                <button id="btnCheck" class="btn-check">
                    <span class="btn-icon">▶</span> Comprobar Código
                </button>
                <button id="btnSave" class="btn-save hidden">
                    <span class="btn-icon">✓</span> Guardar Solución
                </button>
            </div>
        </div>
    </main>

    <!-- Abandon Modal -->
    <div class="battle-modal-overlay hidden" id="abandonOverlay">
        <div class="battle-modal battle-modal-abandon">
            <div class="modal-glow modal-glow-abandon"></div>
            <div class="modal-inner">
                <div class="modal-icon modal-icon-abandon">⚠</div>
                <div class="modal-title modal-title-abandon">¿Abandonar?</div>
                <div class="modal-subtitle">Saldrás de la partida en curso.</div>
                <div class="modal-actions">
                    <button class="btn-modal btn-modal-secondary" onclick="closeAbandonModal()">Quedarse</button>
                    <button class="btn-modal btn-modal-abandon" onclick="doLeave()">Abandonar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="surv-gameover-overlay hidden" id="gameOverOverlay">
        <div class="surv-gameover-box">
            <div class="surv-gameover-glow"></div>
            <div class="surv-gameover-inner">
                <div class="surv-gameover-icon">⏱</div>
                <div class="surv-gameover-title">Tiempo Agotado</div>
                <div class="surv-gameover-solved">
                    <span class="surv-gameover-num" id="goExercisesNum">0</span>
                    <span class="surv-gameover-label">ejercicios resueltos</span>
                </div>
                <div class="surv-gameover-record hidden" id="goNewRecord">
                    <span class="surv-record-badge">★ NUEVO RÉCORD</span>
                </div>
                <div class="surv-gameover-actions">
                    <button class="btn-modal btn-modal-secondary" onclick="window.location.href='Home.html'">
                        ← Menú Principal
                    </button>
                    <button class="btn-modal btn-modal-primary btn-modal-win" onclick="replaySurvival()">
                        Jugar de nuevo ↺
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
    <script src="../services/matchmakingGlobal.js"></script>
    <script src="../services/supervivenciaBattle.js"></script>
</body>
</html>
