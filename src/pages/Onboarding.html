<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/src/services/mobileRedirect.js"></script>
    <script src="/src/services/themeService.js"></script>
    <script src="/src/services/i18n.js"></script>
    <title>Codexar - Configuración Inicial</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/assets/css/Onboarding.css">
    <link rel="stylesheet" href="/src/assets/css/global.css">
    <link rel="stylesheet" href="/src/assets/css/themes.css">
</head>
<body>

    <div class="onboarding-container">
        <div class="onboarding-header">
            <h1 class="brand">CODEX<span>AR</span></h1>
        </div>

        <form class="onboarding-form" id="onboardForm">
            <!-- Username & Avatar -->
            <div class="section-box row-flex">
                <div class="input-container flex-grow">
                    <label for="obUsername" data-i18n="onboarding.usernameLabel">Nombre de usuario</label>
                    <input type="text" id="obUsername" class="form-control" placeholder="Ej: CodeMaster" data-i18n-placeholder="onboarding.usernamePlaceholder" autocomplete="off" required>
                    <small id="usernameStatus" class="status-msg"></small>
                </div>
                <div class="avatar-upload">
                    <div class="avatar-circle" id="obPfpCircle">
                        <span id="obPfpText">PFP</span>
                    </div>
                    <input type="file" id="obPfpInput" accept="image/*" style="display: none;">
                    <small data-i18n="onboarding.avatarHint">Elige tu foto de perfil (opcional)</small>
                </div>
            </div>

            <!-- Languages -->
            <div class="section-box text-center">
                <label data-i18n="onboarding.languagesLabel">Elige tu lenguaje</label>
                <div class="languages-grid">
                    <label class="lang-card cpp">
                        <input type="checkbox" name="languages" value="C++">
                        <img class="icon-img" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg" alt="C++">
                    </label>
                    <label class="lang-card py">
                        <input type="checkbox" name="languages" value="Python">
                        <img class="icon-img" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" alt="Python">
                    </label>
                    <label class="lang-card java">
                        <input type="checkbox" name="languages" value="Java">
                        <img class="icon-img" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg" alt="Java">
                    </label>
                </div>
            </div>

            <!-- Description -->
            <div class="section-box">
                <label class="text-center w-100 block" data-i18n="onboarding.descLabel">Escribe una breve descripción sobre ti</label>
                <textarea id="obDesc" class="form-control desc-area" maxlength="30" placeholder="(máx 30 caracteres)" data-i18n-placeholder="onboarding.descPlaceholder"></textarea>
                <div class="char-counter"><span id="charCount">0</span>/30</div>
            </div>

            <div class="error-message" id="obError"></div>

            <button type="submit" class="btn btn-green w-100" id="obSubmit" disabled data-i18n="onboarding.submit">ENVIAR</button>
        </form>
    </div>

    <script src="/src/services/onboarding.js"></script>
    <script src="/src/services/globalBg.js"></script>
</body>
</html>
