<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../services/themeService.js"></script>
    <title>Codexar — Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/Home.css">
    <link rel="stylesheet" href="../assets/css/Friends.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/themes.css">
</head>
<body class="friends-body">

    <nav class="navbar">
        <div class="brand" onclick="window.location.href='Home.html'" style="cursor:pointer;">Codex<span>ar</span></div>
        <div class="user-pill-container">
            <div class="user-pill" id="userPill">
                <div class="avatar" id="navAvatar"></div>
                <div class="username-display" id="navUsername">Cargando...</div>
            </div>
            <div class="user-dropdown">
                <a href="Home.html" class="dropdown-item">Inicio</a>
                <a href="Profile.html" class="dropdown-item">Perfil</a>
                <a href="Logros.html" class="dropdown-item">Logros</a>
                <a href="Friends.html" class="dropdown-item">Amigos</a>
                <a href="Leaderboard.html" class="dropdown-item">Clasificación</a>
                <a href="Tema.html" class="dropdown-item">Tema</a>
                <a href="#" class="dropdown-item">Ayuda</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <!-- Sub-nav -->
    <div class="sub-nav">
        <div class="sub-nav-inner">
            <a href="Home.html" class="sub-nav-item">Inicio</a>
            <a href="Exercises.html" class="sub-nav-item">Ejercicios</a>
            <div class="sub-nav-item sub-nav-dropdown-wrap">
                Competir <span class="sub-nav-arrow">▾</span>
                <div class="sub-nav-dropdown">
                    <a href="Ranked.html" class="sub-nav-dd-item">Clasificatoria</a>
                    <a href="VsCpu.html"  class="sub-nav-dd-item">VS CPU</a>
                </div>
            </div>
        </div>
    </div>

    <main class="friends-layout">

        <!-- Panel izquierdo: lista de amigos -->
        <section class="fl-left">
            <div class="fl-panel-header">
                <div class="fl-panel-title">
                    <h2>Amigos</h2>
                    <span class="friend-count" id="friendCount">0</span>
                </div>
                <div class="fl-tabs">
                    <button class="fl-tab active" data-filter="all">Todos</button>
                    <button class="fl-tab" data-filter="online">
                        <span class="online-dot-tab"></span>
                        En línea
                        <span class="online-count-tab" id="onlineCount">0</span>
                    </button>
                </div>
            </div>
            <div class="fl-list" id="masterFriendsList">
                <div class="fl-loading">
                    <span class="fl-loading-dot"></span>
                    <span class="fl-loading-dot"></span>
                    <span class="fl-loading-dot"></span>
                </div>
            </div>
        </section>

        <!-- Panel derecho: añadir + solicitudes -->
        <aside class="fl-right">

            <div class="fl-add-card">
                <div class="fl-add-title">
                    <div class="fl-add-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <line x1="19" y1="8" x2="19" y2="14"/>
                            <line x1="22" y1="11" x2="16" y2="11"/>
                        </svg>
                    </div>
                    <div class="fl-add-text">
                        <h3>Añadir Amigo</h3>
                        <p>Nombre de usuario exacto</p>
                    </div>
                </div>
                <div class="fl-add-row">
                    <input
                        type="text"
                        id="friendSearchInput"
                        class="fl-input"
                        placeholder="ej. xX_Codexar_Xx"
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button id="addFriendBtn" class="btn-add-friend">Enviar</button>
                </div>
                <p id="searchFeedback" class="search-feedback"></p>
            </div>

            <div class="fl-requests">
                <div class="fl-req-panel">
                    <div class="fl-req-title">
                        <span>Enviadas</span>
                        <span class="req-badge" id="sentBadge">0</span>
                    </div>
                    <div class="fl-req-list" id="sentRequestsList"></div>
                </div>
                <div class="fl-req-panel">
                    <div class="fl-req-title incoming-title">
                        <span>Recibidas</span>
                        <span class="req-badge incoming" id="receivedBadge">0</span>
                    </div>
                    <div class="fl-req-list" id="receivedRequestsList"></div>
                </div>
            </div>

        </aside>
    </main>

    <script src="../services/matchmakingGlobal.js"></script>
    <script src="../services/friends.js"></script>
    <script src="../services/globalBg.js"></script>
    <script src="../services/friendlyNotifications.js"></script>
    <script src="../services/survivalNotifications.js"></script>
</body>
</html>
