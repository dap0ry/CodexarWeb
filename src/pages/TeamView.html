<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../services/themeService.js"></script>
    <title>Codexar — Equipo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/themes.css">
    <link rel="stylesheet" href="../assets/css/TeamView.css">
</head>
<body>

    <nav class="navbar">
        <div class="brand" onclick="window.location.href='Home.html'" style="cursor:pointer;">Codex<span>ar</span></div>
        <div class="user-pill-container">
            <div class="user-pill" id="userPill">
                <div class="avatar" id="navAvatar"></div>
                <div class="username-display" id="navUsername">Cargando...</div>
            </div>
            <div class="user-dropdown">
                <a href="Home.html"           class="dropdown-item">Inicio</a>
                <a href="Configuracion.html"  class="dropdown-item">Configuración</a>
                <a href="Logros.html"         class="dropdown-item">Logros</a>
                <a href="Friends.html"        class="dropdown-item">Amigos</a>
                <a href="Leaderboard.html"    class="dropdown-item">Clasificación</a>
                <div class="dropdown-divider"></div>
                <a href="CreateExercise.html" class="dropdown-item">Crear Ejercicio</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <main class="tv-main">

        <!-- Loading -->
        <div id="tvLoading" class="tv-loading">
            <div class="tv-spinner"></div>
            <div>Cargando equipo...</div>
        </div>

        <!-- Error -->
        <div id="tvError" class="tv-error hidden">
            <div class="tv-error-code">404</div>
            <div class="tv-error-msg">Equipo no encontrado</div>
            <button class="tv-back-btn" onclick="history.back()">← Volver</button>
        </div>

        <!-- Content -->
        <div id="tvContent" class="tv-container hidden">

            <!-- Hero -->
            <div class="tv-hero">
                <div class="tv-photo-wrap">
                    <div class="tv-photo" id="tvPhoto"></div>
                </div>
                <div class="tv-hero-info">
                    <div class="tv-label">EQUIPO PÚBLICO</div>
                    <h1 class="tv-name" id="tvName">—</h1>
                    <p class="tv-desc" id="tvDesc"></p>
                    <div class="tv-badges">
                        <div class="tv-badge">
                            <span class="tv-badge-val" id="tvMemberCount">—</span>
                            <span class="tv-badge-label">miembros</span>
                        </div>
                        <div class="tv-badge">
                            <span class="tv-badge-val tv-badge-cyan" id="tvTotalSolved">—</span>
                            <span class="tv-badge-label">ejercicios resueltos</span>
                        </div>
                        <div class="tv-badge">
                            <span class="tv-badge-val tv-badge-pink" id="tvHighestElo">—</span>
                            <span class="tv-badge-label">ELO más alto</span>
                        </div>
                        <div class="tv-badge">
                            <span class="tv-badge-val" id="tvAvgElo">—</span>
                            <span class="tv-badge-label">ELO promedio</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Top 3 members -->
            <div class="tv-section">
                <div class="tv-section-label">// TOP MIEMBROS</div>
                <div class="tv-podium" id="tvPodium"></div>
            </div>

            <!-- All members -->
            <div class="tv-section" id="tvAllMembersSection">
                <div class="tv-section-label">// TODOS LOS MIEMBROS</div>
                <div class="tv-members-list" id="tvMembersList"></div>
            </div>

        </div>
    </main>

    <script src="../services/teamView.js"></script>
    <script src="../services/globalBg.js"></script>
</body>
</html>
