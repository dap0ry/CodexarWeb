<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../services/themeService.js"></script>
    <title>Codexar — Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/themes.css">
    <link rel="stylesheet" href="../assets/css/Teams.css">
    <link rel="stylesheet" href="../assets/css/TeamView.css">
</head>
<body>

    <div class="tm-bg-overlay" id="tvBgOverlay"></div>

    <nav class="navbar" style="position:relative;z-index:10;">
        <div class="brand" onclick="window.location.href='/home'" style="cursor:pointer;">Codex<span>ar</span></div>
        <div class="user-pill-container">
            <div class="user-pill" id="userPill">
                <div class="avatar" id="navAvatar"></div>
                <div class="username-display" id="navUsername">...</div>
            </div>
            <div class="user-dropdown">
                <a href="/home"           class="dropdown-item">Inicio</a>
                <a href="/configuracion"  class="dropdown-item">Configuración</a>
                <a href="/logros"         class="dropdown-item">Logros</a>
                <a href="/amigos"        class="dropdown-item">Amigos</a>
                <a href="/clasificacion"    class="dropdown-item">Clasificación</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <main class="tm-main" style="position:relative;z-index:1;">

        <!-- Loading -->
        <div id="tvLoading" class="tm-loading">
            <div class="tm-dot"></div><div class="tm-dot"></div><div class="tm-dot"></div>
        </div>

        <!-- Error -->
        <div id="tvError" class="tv-error hidden">
            <div class="tv-error-code">404</div>
            <div class="tv-error-msg">Club no encontrado</div>
            <button class="tm-btn-cancel" onclick="history.back()">← Volver</button>
        </div>

        <!-- Content (mirrors /equipos has-team view, read-only) -->
        <div id="tvContent" class="tm-page hidden" style="position:relative;z-index:1;">
            <div class="tm-content">

                <!-- Hero -->
                <div class="tm-hero">
                    <div class="tm-banner hidden" id="tvBanner"></div>

                    <div class="tm-identity-row">
                        <div class="tm-photo-wrap" style="cursor:default;">
                            <div class="tm-photo" id="tvPhoto"></div>
                        </div>

                        <div class="tm-identity-info">
                            <div class="tm-club-label">// CLUB PÚBLICO</div>
                            <h1 class="tm-club-name" id="tvName">—</h1>
                            <p  class="tm-club-desc" id="tvDesc"></p>
                            <div class="tm-role-row">
                                <span class="tm-member-count" id="tvMemberCount">— miembros</span>
                            </div>
                        </div>

                        <div class="tm-hero-actions">
                            <button class="tm-btn-cancel tv-back-btn" onclick="history.back()">← Volver</button>
                        </div>
                    </div>

                    <div class="tm-stats-bar">
                        <div class="tm-stat-pill">
                            <span class="tm-stat-val"         id="tvStatMembers">0</span>
                            <span class="tm-stat-lbl">Miembros</span>
                        </div>
                        <div class="tm-stat-sep"></div>
                        <div class="tm-stat-pill">
                            <span class="tm-stat-val tm-cyan" id="tvStatTotalSolved">0</span>
                            <span class="tm-stat-lbl">Ejercicios resueltos</span>
                        </div>
                        <div class="tm-stat-sep"></div>
                        <div class="tm-stat-pill">
                            <span class="tm-stat-val tm-pink" id="tvStatHighestElo">0</span>
                            <span class="tm-stat-lbl">ELO más alto</span>
                        </div>
                        <div class="tm-stat-sep"></div>
                        <div class="tm-stat-pill">
                            <span class="tm-stat-val tm-gold" id="tvStatAvgElo">0</span>
                            <span class="tm-stat-lbl">ELO promedio</span>
                        </div>
                    </div>
                </div>

                <!-- Members grid (all, read-only) -->
                <div class="tm-section">
                    <div class="tm-section-head">
                        <div class="tm-section-label">// MIEMBROS</div>
                    </div>
                    <div class="tm-members-grid" id="tvMembersGrid"></div>
                </div>

            </div>
        </div>
    </main>

    <script src="../services/teamView.js"></script>
    <script src="../services/globalBg.js"></script>
</body>
</html>
