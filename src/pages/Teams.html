<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/src/services/mobileRedirect.js"></script>
    <script src="/src/services/themeService.js"></script>
    <script src="/src/services/i18n.js"></script>
    <title>Codexar — Equipos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/assets/css/Home.css">
    <link rel="stylesheet" href="/src/assets/css/Tournaments.css">
    <link rel="stylesheet" href="/src/assets/css/Teams.css">
    <link rel="stylesheet" href="/src/assets/css/global.css">
    <link rel="stylesheet" href="/src/assets/css/themes.css">
</head>
<body>

<nav class="navbar">
    <div class="brand" onclick="window.location.href='/home'" style="cursor:pointer;">Codex<span>ar</span></div>
    <div class="user-pill-container">
        <div class="user-pill" id="userPill">
            <div class="avatar" id="navAvatar"></div>
            <div class="username-display" id="navUsername">Cargando...</div>
        </div>
        <div class="user-dropdown">
            <a href="/home"          class="dropdown-item" data-i18n="nav.home">Inicio</a>
            <a href="/configuracion" class="dropdown-item" data-i18n="nav.settings">Configuración</a>
            <a href="/logros"        class="dropdown-item" data-i18n="nav.achievements">Logros</a>
            <a href="/amigos"        class="dropdown-item" data-i18n="nav.friends">Amigos</a>
            <a href="/clasificacion" class="dropdown-item" data-i18n="nav.leaderboard">Clasificación</a>
            <a href="#"              class="dropdown-item" data-i18n="nav.help">Ayuda</a>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn" data-i18n="nav.logout">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div id="tmLoading" class="tm-load-screen">
    <div class="tm-dot"></div><div class="tm-dot"></div><div class="tm-dot"></div>
</div>

<div id="tmPage" class="t-page hidden">

    <div class="t-header">
        <div class="t-header-left">
            <div class="t-title">EQUI<span>POS</span></div>
            <div class="t-subtitle">Clubs · Únete o funda el tuyo</div>
        </div>
        <div class="t-header-right">
            <div id="tmTopBar" class="hidden">
                <button class="t-create-btn" id="tmOpenCreateBtn">+ Fundar club</button>
            </div>
            <div id="tmMyTeamBar" class="hidden"></div>
        </div>
    </div>

    <div id="tmPendingStrip" class="tm-pending-strip hidden"></div>

    <div class="t-grid" id="tmClubsGrid">
        <div class="t-loading">Cargando clubes...</div>
    </div>

</div>

<div class="t-modal-overlay hidden" id="tmCreateModal">
    <div class="t-modal">
        <div class="t-modal-header">
            <span class="t-modal-title">// FUNDAR CLUB</span>
            <button class="t-modal-close" id="tmCreateCancel">✕</button>
        </div>
        <div class="t-modal-body">
            <label class="t-label">
                <span>Nombre del club</span>
                <input class="t-input" type="text" id="createName" placeholder="Nombre del club (máx. 20 car.)" maxlength="20" autocomplete="off">
            </label>
            <label class="t-label">
                <span>Descripción</span>
                <textarea class="t-input t-textarea" id="createDesc" placeholder="Descripción (opcional)" rows="3"></textarea>
            </label>
            <div class="t-modal-footer">
                <span class="tm-feedback" id="createFeedback"></span>
                <button class="t-modal-submit" type="button" id="tmCreateSave">Fundar</button>
            </div>
        </div>
    </div>
</div>

<div id="tmToast" class="tm-toast hidden"></div>

<script src="/src/services/teams.js"></script>
<script src="/src/services/globalBg.js"></script>
<script src="/src/services/roleNav.js"></script>
</body>
</html>
