<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../services/themeService.js"></script>
    <title>Codexar - Logros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/Home.css">
    <link rel="stylesheet" href="../assets/css/Logros.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/themes.css">
</head>
<body class="logros-body">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand" onclick="window.location.href='/home'" style="cursor:pointer;">Codex<span>ar</span></div>
        <div class="user-pill-container">
            <div class="user-pill" id="userPill">
                <div class="avatar" id="navAvatar"></div>
                <div class="username-display" id="navUsername">Cargando...</div>
            </div>
            <div class="user-dropdown">
                <a href="/home" class="dropdown-item">Inicio</a>
                <a href="/configuracion" class="dropdown-item">Configuración</a>
                <a href="/logros" class="dropdown-item">Logros</a>
                <a href="/amigos" class="dropdown-item">Amigos</a>
                <a href="/clasificacion" class="dropdown-item">Clasificación</a>
                <a href="#" class="dropdown-item">Ayuda</a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="logros-container">
        <div class="logros-header">
            <h1>Logros</h1>
            <p>Completa desafíos para desbloquear logros y equiparlos en tu perfil</p>
        </div>
        <div id="achievementsContainer" class="achievements-container">
            <div class="ach-loading">Cargando logros...</div>
        </div>
    </main>

    <!-- Replace Modal -->
    <div class="replace-overlay hidden" id="replaceOverlay">
        <div class="replace-modal">
            <h2 class="replace-title">Reemplazar Logro</h2>
            <p class="replace-desc">Ya tienes 3 logros equipados. Elige cuál quieres reemplazar:</p>
            <div class="replace-slots" id="replaceSlots"></div>
            <button class="replace-cancel" onclick="closeReplaceModal()">Cancelar</button>
        </div>
    </div>

    <script src="../services/matchmakingGlobal.js"></script>
    <script src="../services/logros.js"></script>
    <script src="../services/globalBg.js"></script>
    <script src="../services/friendlyNotifications.js"></script>
    <script src="../services/survivalNotifications.js"></script>
    <script src="../services/roleNav.js"></script>
</body>
</html>
