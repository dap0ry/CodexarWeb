<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/src/services/mobileRedirect.js"></script>
    <script src="/src/services/themeService.js"></script>
    <script src="/src/services/i18n.js"></script>
    <title>Codexar — Torneos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/assets/css/Home.css">
    <link rel="stylesheet" href="/src/assets/css/Tournaments.css">
    <link rel="stylesheet" href="/src/assets/css/global.css">
    <link rel="stylesheet" href="/src/assets/css/themes.css">
    <style>
        /* Extensions for the new exercise-scoring system */
        .t-card-exercises {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 2px;
        }
        .t-ex-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 7px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.52rem;
            color: var(--text-muted);
        }
        .t-ex-pts {
            font-weight: 700;
            font-size: 0.5rem;
        }
        .t-card-duration {
            font-family: var(--font-mono);
            font-size: 0.55rem;
            color: var(--text-muted);
            opacity: 0.55;
        }
        /* Leaderboard inside card */
        .t-lb-toggle {
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.12);
            border-radius: 5px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.52rem;
            letter-spacing: 0.5px;
            padding: 3px 10px;
            cursor: pointer;
            transition: all .15s;
        }
        .t-lb-toggle:hover { border-color: rgba(255,255,255,0.25); color: var(--text-light); }
        .t-lb-wrap { display: none; margin-top: 8px; }
        .t-lb-wrap.open { display: block; }
        .t-lb-table { width: 100%; border-collapse: collapse; }
        .t-lb-table th {
            text-align: left;
            font-family: var(--font-mono);
            font-size: 0.48rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            opacity: 0.5;
            padding: 4px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .t-lb-table td {
            padding: 5px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-muted);
        }
        .t-lb-rank { width: 28px; font-weight: 700; }
        .t-lb-rank.gold   { color: #ffd700; }
        .t-lb-rank.silver { color: #c0c0c0; }
        .t-lb-rank.bronze { color: #cd7f32; }
        .t-lb-name { color: var(--text-light); }
        .t-lb-score { color: var(--accent-cyan); font-weight: 700; }
        .t-lb-av {
            width: 18px; height: 18px; border-radius: 50%;
            object-fit: cover; vertical-align: middle; margin-right: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .t-lb-av-ph {
            display: inline-flex; align-items: center; justify-content: center;
            width: 18px; height: 18px; border-radius: 50%;
            background: rgba(0,255,204,0.08); border: 1px solid rgba(0,255,204,0.15);
            font-size: 0.45rem; font-weight: 800; color: var(--accent-cyan);
            vertical-align: middle; margin-right: 5px;
        }
        /* Desktop CTA bar */
        .t-cta-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 5%;
            background: rgba(0,255,204,0.04);
            border-bottom: 1px solid rgba(0,255,204,0.1);
            flex-shrink: 0;
        }
        .t-cta-bar-text {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            opacity: 0.75;
            letter-spacing: 0.5px;
        }
        .t-cta-bar-link {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--accent-cyan);
            text-decoration: none;
            border: 1px solid rgba(0,255,204,0.25);
            border-radius: 5px;
            padding: 3px 10px;
            transition: all .15s;
            white-space: nowrap;
        }
        .t-cta-bar-link:hover { background: rgba(0,255,204,0.08); }
        /* Admin buttons in card footer */
        .t-join-card-btn--start {
            background: var(--accent-cyan);
            border: none;
            color: #06060f;
            font-weight: 800;
        }
        .t-join-card-btn--start:hover { box-shadow: 0 0 14px rgba(0,255,204,0.3); }
        .t-join-card-btn--del {
            background: transparent;
            border: 1px solid rgba(239,68,68,0.2);
            color: rgba(239,68,68,0.6);
        }
        .t-join-card-btn--del:hover { border-color: rgba(239,68,68,0.5); color: #ef4444; }
        .t-card-footer-left { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
        .t-card-footer-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        /* Participant chips */
        .t-participants-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 6px 0;
        }
        .t-participant-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            font-family: var(--font-mono);
            font-size: 0.55rem;
            color: var(--text-muted);
        }
        .t-participant-more {
            font-family: var(--font-mono);
            font-size: 0.52rem;
            color: var(--text-muted);
            opacity: 0.5;
            align-self: center;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="brand" onclick="window.location.href='/home'" style="cursor:pointer;">Codex<span>ar</span></div>
    <div class="user-pill-container">
        <div class="user-pill" id="userPill">
            <div class="avatar" id="navAvatar"></div>
            <div class="username-display" id="navUsername">Cargando...</div>
        </div>
        <div class="user-dropdown">
            <a href="/home"          class="dropdown-item" data-i18n="nav.home">Inicio</a>
            <a href="/configuracion" class="dropdown-item" data-i18n="nav.settings">Configuración</a>
            <a href="/logros"        class="dropdown-item" data-i18n="nav.achievements">Logros</a>
            <a href="/amigos"        class="dropdown-item" data-i18n="nav.friends">Amigos</a>
            <a href="/clasificacion" class="dropdown-item" data-i18n="nav.leaderboard">Clasificación</a>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item dropdown-item-danger" id="logoutBtn" data-i18n="nav.logout">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="t-page" id="listPanel">

    <div class="t-header">
        <div class="t-header-left">
            <div class="t-title">TOR<span>NEOS</span></div>
            <div class="t-subtitle">Ejercicios · Clasificación · App de escritorio</div>
        </div>
        <div class="t-header-right">
            <div class="t-tabs">
                <button class="t-tab active" data-filter="all">Todos</button>
                <button class="t-tab" data-filter="upcoming">Próximos</button>
                <button class="t-tab" data-filter="active">Activos</button>
                <button class="t-tab" data-filter="finished">Finalizados</button>
            </div>
        </div>
    </div>

    <div class="t-cta-bar">
        <span class="t-cta-bar-text">🖥️ Para competir necesitas la aplicación de escritorio</span>
        <a href="/torneos/ayuda" class="t-cta-bar-link">Descargar app →</a>
    </div>

    <div class="t-grid" id="tournGrid">
        <div class="t-loading">Cargando torneos...</div>
    </div>

</div>

<script src="/src/services/tournaments.js"></script>
<script src="/src/services/globalBg.js"></script>
<script src="/src/services/roleNav.js"></script>
</body>
</html>
