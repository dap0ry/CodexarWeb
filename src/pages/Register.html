<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codexar - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/Auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <div class="brand">Codex<span>ar</span></div>
            <p>Crea tu cuenta de jugador</p>
        </div>
        
        <form class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="hacker@codexar.dev" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="success-message" id="successMessage"></div>
            <div class="error-message" id="errorMessage">Error al registrar usuario.</div>
            
            <button type="submit" class="btn" id="registerBtn">Registrarse</button>
        </form>
        
        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="Login.html">Inicia sesión</a>
        </div>
    </div>

    <script src="../services/auth.js"></script>
</body>
</html>
